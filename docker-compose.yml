services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iqraa_school
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d iqraa_school"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/iqraa_school
      JWT_SECRET: ${JWT_SECRET:-change-me-docker-dev-secret-32chars-min}
      NODE_ENV: production
      DEMO_MODE: "false"
      PORT: 3001
      BACKUP_AUTO: "false"
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_backups:/app/server/backups
      - app_uploads:/app/server/uploads

volumes:
  pgdata:
  app_backups:
  app_uploads:
