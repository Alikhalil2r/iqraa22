      <h3 className="font-bold text-sm mb-4">ثيمات جاهزة</h3>
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
        {presets.map((p,i)=>(
          <button key={i} onClick={()=>setLocal({primaryColor:p.primary,accentColor:p.accent})} className={`p-3 rounded-xl border-2 text-center transition-all hover:scale-105 ${local.primaryColor===p.primary&&local.accentColor===p.accent?'border-gray-800 shadow-lg':'border-gray-100'}`}>
            <div className="flex gap-1.5 justify-center mb-2"><div className="w-8 h-8 rounded-lg shadow-sm" style={{backgroundColor:p.primary}}/><div className="w-4 h-8 rounded-lg shadow-sm" style={{backgroundColor:p.accent}}/></div>
            <p className="text-[10px] font-bold text-gray-700">{p.name}</p>
          </button>
        ))}
      </div>
    </div>
    <div className="bg-white p-6 rounded-2xl shadow-sm mb-5 border-t-4 border-indigo-500">
      <h3 className="font-bold text-sm mb-4">ألوان مخصصة</h3>

/* ═══════════════════════════════════════════════════════════════
   🎓 ADMIN: STUDENTS MANAGEMENT
   ═══════════════════════════════════════════════════════════════ */
function AStudents({data,setData,notify}){
  const students=data.parentPortal?.students||[];
  const [form,setForm]=useState({name:'',grade:'',accessCode:'',parentPhone:'',parentEmail:'',busId:'',notes:''});
  const [editId,setEditId]=useState(null);const [showForm,setShowForm]=useState(false);const [search,setSearch]=useState('');const [gradeFilter,setGradeFilter]=useState('all');
  const buses=data.buses||[];const grades=[...new Set(students.map(s=>s.grade).filter(Boolean))].sort();
  const reset=()=>{setForm({name:'',grade:'',accessCode:'',parentPhone:'',parentEmail:'',busId:'',notes:''});setEditId(null);setShowForm(false);};
  const genCode=()=>Math.random().toString(36).substring(2,8).toUpperCase();
  const save=()=>{
    if(!form.name.trim()||!form.grade.trim()){notify('الاسم والصف مطلوبان','warning');return;}
    const code=form.accessCode.trim()||genCode();
    const pp=data.parentPortal||{};const studs=pp.students||[];
    if(editId!==null){
      const updated=studs.map(s=>s.id===editId?{...s,...form,accessCode:code}:s);
      setData({...data,parentPortal:{...pp,students:updated}});notify('تم التعديل','success');
    }else{
      const newS={...form,id:Date.now(),accessCode:code,grades:[],attendance:[],behavior:[]};
      setData({...data,parentPortal:{...pp,students:[...studs,newS]}});notify('تمت الإضافة','success');
    }
    reset();
  };
  const del=(id)=>{if(window.confirm('حذف هذا الطالب؟')){const pp=data.parentPortal||{};setData({...data,parentPortal:{...pp,students:(pp.students||[]).filter(s=>s.id!==id)}});notify('تم الحذف');}};
  const filtered=students.filter(s=>(!search||(s.name||'').includes(search))&&(gradeFilter==='all'||s.grade===gradeFilter));
  const attKey='attendanceStudents';const att=data[attKey]||{};
  const getStudentAttStats=(id)=>{let p=0,a=0;Object.values(att).forEach(d=>{if(d[id]==='present')p++;if(d[id]==='absent')a++;});return{p,a,total:p+a};};
  return(<div>
    <h2 className="text-xl font-black text-gray-800 mb-1 flex items-center gap-2"><GraduationCap size={22} className="text-emerald-600"/>إدارة الطلاب</h2>
    <p className="text-sm text-gray-500 mb-5">سجلات الطلاب وبيانات أولياء الأمور وإحصائيات الحضور</p>
    <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5">
      <div className="bg-white p-4 rounded-2xl shadow-sm border-r-4 border-emerald-500 text-center"><p className="text-2xl font-black text-gray-800">{students.length}</p><p className="text-[10px] text-gray-500 font-bold">إجمالي الطلاب</p></div>
      <div className="bg-white p-4 rounded-2xl shadow-sm border-r-4 border-sky-500 text-center"><p className="text-2xl font-black text-sky-600">{grades.length}</p><p className="text-[10px] text-gray-500 font-bold">صف دراسي</p></div>
      <div className="bg-white p-4 rounded-2xl shadow-sm border-r-4 border-amber-500 text-center"><p className="text-2xl font-black text-amber-600">{students.filter(s=>s.busId).length}</p><p className="text-[10px] text-gray-500 font-bold">يستخدمون الحافلة</p></div>
      <div className="bg-white p-4 rounded-2xl shadow-sm border-r-4 border-purple-500 text-center"><p className="text-2xl font-black text-purple-600">{Object.keys(att).length}</p><p className="text-[10px] text-gray-500 font-bold">يوم حضور مسجل</p></div>
    </div>
    <div className="flex flex-wrap gap-2 mb-5">
      <button onClick={()=>{reset();setShowForm(true);}} className="bg-emerald-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-emerald-700 shadow-lg shadow-emerald-600/20"><Plus size={14}/>إضافة طالب</button>
      <div className="flex-1 min-w-[160px] relative"><Search size={13} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"/><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="بحث..." className="w-full pr-8 pl-3 py-2.5 border rounded-xl text-sm border-gray-200"/></div>
      <select value={gradeFilter} onChange={e=>setGradeFilter(e.target.value)} className="px-3 py-2.5 border rounded-xl text-sm border-gray-200"><option value="all">كل الصفوف</option>{grades.map(g=><option key={g}>{g}</option>)}</select>
    </div>
    {showForm&&(<div className="bg-white p-6 rounded-2xl shadow-sm mb-6 border-t-4 border-emerald-500">
      <div className="flex items-center justify-between mb-4"><h3 className="font-bold text-sm">{editId?'تعديل بيانات طالب':'إضافة طالب جديد'}</h3><button onClick={reset} className="text-gray-400 hover:text-gray-600"><X size={16}/></button></div>
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">اسم الطالب *</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200"/></div>
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">الصف الدراسي *</label><input value={form.grade} onChange={e=>setForm({...form,grade:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200" placeholder="مثال: الصف العاشر أ"/></div>
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">رمز الدخول</label><div className="flex gap-1"><input value={form.accessCode} onChange={e=>setForm({...form,accessCode:e.target.value})} className="flex-1 p-2.5 border rounded-xl text-sm border-gray-200" placeholder="تلقائي"/><button onClick={()=>setForm({...form,accessCode:genCode()})} className="px-3 py-2.5 bg-gray-100 text-gray-600 rounded-xl text-xs font-bold hover:bg-gray-200">توليد</button></div></div>
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">هاتف ولي الأمر</label><input value={form.parentPhone} onChange={e=>setForm({...form,parentPhone:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200" dir="ltr"/></div>
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">بريد ولي الأمر</label><input value={form.parentEmail} onChange={e=>setForm({...form,parentEmail:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200" dir="ltr"/></div>
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">الحافلة المدرسية</label><select value={form.busId||''} onChange={e=>setForm({...form,busId:e.target.value?parseInt(e.target.value):''})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200"><option value="">بدون حافلة</option>{buses.map(b=><option key={b.id} value={b.id}>{b.plateNumber} - {b.area||b.route}</option>)}</select></div>
        <div className="col-span-full"><label className="block text-[10px] font-bold text-gray-500 mb-1">ملاحظات</label><input value={form.notes||''} onChange={e=>setForm({...form,notes:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200"/></div>
      </div>
      <div className="flex gap-2 mt-4"><button onClick={save} className="bg-emerald-600 text-white px-6 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-emerald-700"><Save size={14}/>{editId?'حفظ':'إضافة'}</button><button onClick={reset} className="bg-gray-200 text-gray-600 px-5 py-2.5 rounded-xl text-sm font-bold">إلغاء</button></div>
    </div>)}
    {filtered.length===0?(<div className="bg-white rounded-2xl shadow-sm p-12 text-center"><GraduationCap size={40} className="mx-auto mb-3 text-gray-200"/><p className="text-gray-400 text-sm">{search||gradeFilter!=='all'?'لا نتائج مطابقة':'لم يتم إضافة طلاب بعد'}</p></div>):(
      <div className="bg-white rounded-2xl shadow-sm overflow-hidden">
        <div className="divide-y divide-gray-50">{filtered.map(s=>{
          const stats=getStudentAttStats(s.id);const bus=buses.find(b=>b.id===s.busId);
          return(<div key={s.id} className="flex items-center gap-4 p-4 hover:bg-gray-50 transition">
            <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-emerald-500 to-emerald-700 flex items-center justify-center text-white font-black text-lg flex-shrink-0">{(s.name||'?')[0]}</div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 flex-wrap"><p className="font-bold text-sm text-gray-800">{s.name}</p><span className="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-bold">{s.grade}</span>{bus&&<span className="text-[9px] bg-sky-100 text-sky-700 px-1.5 py-0.5 rounded font-bold"><Bus size={8} className="inline mr-0.5"/>{bus.plateNumber}</span>}</div>
              <div className="flex gap-2 mt-1">
                <span className="text-[10px] text-gray-400">كود: <b className="text-gray-700 font-mono">{s.accessCode||'—'}</b></span>
                {stats.total>0&&<span className="text-[10px] text-emerald-600 font-bold">حضور: {stats.p}/{stats.total}</span>}
                {s.parentPhone&&<span className="text-[10px] text-gray-400" dir="ltr">{s.parentPhone}</span>}
              </div>
            </div>
            <div className="flex gap-1 flex-shrink-0">
              <button onClick={()=>{setForm({name:s.name,grade:s.grade||'',accessCode:s.accessCode||'',parentPhone:s.parentPhone||'',parentEmail:s.parentEmail||'',busId:s.busId||'',notes:s.notes||''});setEditId(s.id);setShowForm(true);window.scrollTo({top:0,behavior:'smooth'});}} className="p-2 text-sky-600 hover:bg-sky-50 rounded-lg"><Edit size={13}/></button>
              <button onClick={()=>del(s.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg"><Trash2 size={13}/></button>
            </div>
          </div>);
        })}</div>
      </div>
    )}
  </div>);
}

function ANotif({data,setData,notify}){
  const alerts = data.emergencyAlerts || [];
  const [form, setForm] = useState({message:'', type:'info', priority:'normal'});
  const [editId, setEditId] = useState(null);
  const reset = () => { setForm({message:'',type:'info',priority:'normal'}); setEditId(null); };

  const typeOptions = [
    { v:'urgent', l:'🔴 عاجل جداً', c:'bg-red-700 text-white', desc:'للحالات الطارئة كالإجازات المفاجئة والكوارث' },
    { v:'danger', l:'⚠️ تحذير هام', c:'bg-red-500 text-white', desc:'تنبيهات أمنية أو تحذيرات مهمة' },
    { v:'warning', l:'⚡ تنبيه', c:'bg-amber-500 text-white', desc:'مواعيد مهمة أو تذكيرات' },
    { v:'success', l:'✅ إعلان إيجابي', c:'bg-emerald-600 text-white', desc:'نتائج، إنجازات، أخبار سارة' },
    { v:'info', l:'📢 معلومة عامة', c:'bg-sky-600 text-white', desc:'إعلانات عامة ومعلومات' },
  ];

  const save = () => {
    if(!form.message.trim()){notify('اكتب نص الإعلان','warning');return;}
    if(editId!==null){
      setData({...data, emergencyAlerts: alerts.map(a=>a.id===editId?{...a,...form,active:a.active}:a)});
      notify('تم تعديل الإعلان','success');
    } else {
      setData({...data, emergencyAlerts: [{...form,id:Date.now(),active:true},...alerts]});
      notify('تم إضافة الإعلان وتفعيله','success');
    }
    reset();
  };
  const del = (id) => { if(window.confirm('حذف هذا الإعلان؟')){setData({...data,emergencyAlerts:alerts.filter(a=>a.id!==id)});notify('تم الحذف');} };
  const toggle = (id) => { setData({...data,emergencyAlerts:alerts.map(a=>a.id===id?{...a,active:!a.active}:a)}); };
  const activeCount = alerts.filter(a=>a.active).length;

  const previewStyle = {
    urgent:'bg-red-700', danger:'bg-red-500', warning:'bg-amber-500', success:'bg-emerald-600', info:'bg-sky-600'
  };

  return(<div>
    <h2 className="text-xl font-black text-gray-800 mb-1 flex items-center gap-2"><Megaphone size={22} className="text-red-500"/>الإعلانات الطارئة</h2>

    {/* Stats */}
    <div className="flex gap-3 mb-6">
      <div className="bg-white p-3 px-5 rounded-2xl shadow-sm border-r-4 border-emerald-500"><p className="text-[10px] text-gray-500 font-bold">إجمالي</p><p className="text-lg font-black text-gray-800">{alerts.length}</p></div>
      <div className="bg-white p-3 px-5 rounded-2xl shadow-sm border-r-4 border-green-500"><p className="text-[10px] text-gray-500 font-bold">مفعّل</p><p className="text-lg font-black text-emerald-600">{activeCount}</p></div>
      <div className="bg-white p-3 px-5 rounded-2xl shadow-sm border-r-4 border-gray-300"><p className="text-[10px] text-gray-500 font-bold">معطّل</p><p className="text-lg font-black text-gray-400">{alerts.length-activeCount}</p></div>
    </div>

    {/* Add/Edit Form */}
    <div className="bg-white p-6 rounded-2xl shadow-sm mb-6 border-t-4 border-red-500">
      <h3 className="font-bold text-sm mb-4 flex items-center gap-2">{editId!==null?<><Edit size={14} className="text-amber-600"/>تعديل إعلان</>:<><Plus size={14} className="text-red-500"/>إضافة إعلان طارئ جديد</>}</h3>

      {/* Live Preview */}
      <div className={`${previewStyle[form.type]||'bg-sky-600'} text-white p-3 rounded-xl mb-4 text-center font-bold text-sm flex items-center justify-center gap-2 ${form.message?'':'opacity-40'}`}>
        <AlertTriangle size={14}/> {form.message || 'معاينة الإعلان ستظهر هنا...'}
        {form.priority==='high' && <span className="w-2 h-2 bg-white rounded-full animate-ping"/>}
      </div>

      <div className="space-y-4">
        {/* Message */}
        <div>
          <label className="block text-xs font-bold text-gray-600 mb-1">نص الإعلان <span className="text-red-500">*</span></label>
          <textarea value={form.message} onChange={e=>setForm({...form,message:e.target.value})} rows={2} placeholder="مثال: غداً إجازة رسمية بسبب الأحوال الجوية..." className="w-full p-3 border rounded-xl text-sm border-gray-200 focus:border-red-400 outline-none transition"/>
        </div>

        {/* Type Selection - Visual Cards */}
        <div>
          <label className="block text-xs font-bold text-gray-600 mb-2">نوع الإعلان ولونه</label>
          <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-2">
            {typeOptions.map(t=>(
              <button key={t.v} onClick={()=>setForm({...form,type:t.v})} className={`p-3 rounded-xl border-2 text-right transition-all ${form.type===t.v?'border-gray-800 shadow-lg scale-[1.02]':'border-gray-100 hover:border-gray-300'}`}>
                <div className="flex items-center gap-2 mb-1">
                  <span className={`text-[9px] px-2 py-0.5 rounded-md font-black ${t.c}`}>{t.l}</span>
                  {form.type===t.v && <Check size={14} className="text-emerald-600 mr-auto"/>}
                </div>
                <p className="text-[10px] text-gray-400">{t.desc}</p>
              </button>
            ))}
          </div>
        </div>

        {/* Priority */}
        <div>
          <label className="block text-xs font-bold text-gray-600 mb-2">الأهمية</label>
          <div className="flex gap-2">
            <button onClick={()=>setForm({...form,priority:'normal'})} className={`flex items-center gap-2 px-4 py-2.5 rounded-xl text-xs font-bold border-2 transition-all ${form.priority==='normal'?'border-gray-700 bg-gray-50':'border-gray-100'}`}>
              <span className="w-2 h-2 bg-gray-400 rounded-full"/> عادي
            </button>
            <button onClick={()=>setForm({...form,priority:'high'})} className={`flex items-center gap-2 px-4 py-2.5 rounded-xl text-xs font-bold border-2 transition-all ${form.priority==='high'?'border-red-500 bg-red-50':'border-gray-100'}`}>
              <span className="w-2 h-2 bg-red-500 rounded-full animate-ping"/> عالي الأهمية (مع وميض)
            </button>
          </div>
        </div>
      </div>

      <div className="flex gap-2 mt-5">
        <button onClick={save} className="bg-red-600 text-white px-6 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-red-700 transition shadow-lg shadow-red-600/20">{editId!==null?<><Check size={13}/>حفظ التعديل</>:<><Megaphone size={13}/>نشر الإعلان</>}</button>
        {editId!==null&&<button onClick={reset} className="bg-gray-200 text-gray-600 px-5 py-2.5 rounded-xl text-sm font-bold">إلغاء</button>}
      </div>
    </div>

    {/* Alerts List */}
    <div className="bg-white p-6 rounded-2xl shadow-sm">
      <h3 className="font-bold text-sm mb-4 flex items-center gap-2"><Bell size={14} className="text-amber-500"/>الإعلانات ({alerts.length})</h3>
      {alerts.length===0 ? <div className="text-center py-10 text-gray-400"><Megaphone size={36} className="mx-auto mb-2 opacity-20"/><p className="text-sm">لا توجد إعلانات. أضف إعلاناً من النموذج أعلاه.</p></div> :
      <div className="space-y-2">{alerts.map(a=>{
        const tOpt = typeOptions.find(t=>t.v===a.type) || typeOptions[4];
        return(
          <div key={a.id} className={`p-4 rounded-xl border transition-all ${a.active?'bg-white border-gray-200 shadow-sm':'bg-gray-50 border-gray-100 opacity-60'}`}>
            <div className="flex items-start gap-3">
              {/* Toggle */}
              <button onClick={()=>toggle(a.id)} className={`mt-0.5 w-10 h-5 rounded-full transition-all flex items-center px-0.5 flex-shrink-0 ${a.active?'bg-emerald-500 justify-end':'bg-gray-300 justify-start'}`}><div className="w-4 h-4 bg-white rounded-full shadow"/></button>

              {/* Content */}
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 mb-1 flex-wrap">
                  <span className={`text-[9px] px-2 py-0.5 rounded-md font-black ${tOpt.c}`}>{tOpt.l}</span>
                  {a.priority==='high'&&<span className="text-[9px] bg-red-100 text-red-600 px-1.5 py-0.5 rounded font-bold flex items-center gap-1"><span className="w-1 h-1 bg-red-500 rounded-full animate-pulse"/>عالي</span>}
                  <span className={`text-[9px] px-1.5 py-0.5 rounded font-bold ${a.active?'bg-emerald-100 text-emerald-600':'bg-gray-200 text-gray-500'}`}>{a.active?'مفعّل':'معطّل'}</span>
                </div>
                <p className={`text-sm font-bold ${a.active?'text-gray-800':'text-gray-500'}`}>{a.message}</p>
              </div>

              {/* Actions */}
              <div className="flex gap-1 flex-shrink-0">
                <button onClick={()=>{setForm({message:a.message,type:a.type||'info',priority:a.priority||'normal'});setEditId(a.id);window.scrollTo({top:0,behavior:'smooth'});}} className="p-2 text-sky-600 hover:bg-sky-50 rounded-lg transition"><Edit size={13}/></button>
                <button onClick={()=>del(a.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg transition"><Trash2 size={13}/></button>
              </div>
            </div>
          </div>
        );
      })}</div>}
    </div>

    {/* Quick Examples */}
    <div className="mt-6 bg-amber-50 border border-amber-200 p-4 rounded-2xl">
      <h4 className="text-xs font-bold text-amber-700 mb-2 flex items-center gap-1"><Lightbulb size={13}/> أمثلة سريعة (اضغط للاستخدام)</h4>
      <div className="flex flex-wrap gap-1.5">
        {[
          {msg:'🌧️ غداً إجازة رسمية بسبب الأحوال الجوية',t:'urgent',p:'high'},
          {msg:'📋 نتائج الفصل الدراسي الأول متاحة الآن عبر البوابة الإلكترونية',t:'success',p:'high'},
          {msg:'📅 الاختبارات النهائية تبدأ يوم الأحد القادم',t:'warning',p:'normal'},
          {msg:'🎉 تهانينا لطلابنا الأوائل في المسابقة الوطنية',t:'success',p:'normal'},
          {msg:'⏰ آخر موعد لدفع الرسوم الدراسية: نهاية الشهر',t:'danger',p:'high'},
          {msg:'📣 اجتماع أولياء الأمور يوم الأربعاء الساعة 5 مساءً',t:'info',p:'normal'},
        ].map((ex,i)=>(
          <button key={i} onClick={()=>setForm({message:ex.msg,type:ex.t,priority:ex.p})} className="text-[10px] bg-white text-amber-800 px-2.5 py-1.5 rounded-lg font-bold hover:bg-amber-100 transition border border-amber-200">{ex.msg.substring(0,35)}...</button>
        ))}
      </div>
    </div>
  </div>);

function ACrud({data,setData,notify,type,cfg}){const items=data[type]||[];const[form,setForm]=useState({});const[editId,setEditId]=useState(null);const reset=()=>{setForm({});setEditId(null);};const add=()=>{const miss=cfg.fields.filter(f=>f.r&&!form[f.k]?.toString().trim());if(miss.length){notify('أكمل: '+miss.map(f=>f.l).join(', '),'warning');return;}if(editId!==null){setData({...data,[type]:items.map(x=>(x.id!==undefined?x.id:items.indexOf(x))===editId?{...x,...form}:x)});notify('تم التعديل');}else{setData({...data,[type]:[...items,{...form,id:Date.now()}]});notify('تمت الإضافة');}reset();};const del=(id)=>{if(window.confirm('حذف؟')){setData({...data,[type]:items.filter(x=>(x.id!==undefined?x.id:items.indexOf(x))!==id)});notify('تم الحذف');}};

  <div className="bg-white p-5 rounded-2xl shadow-sm"><h3 className="font-bold text-sm mb-3">العناصر ({items.length})</h3>{items.length===0?<p className="text-gray-400 text-center py-6 text-sm">لا توجد عناصر</p>:<div className="space-y-1.5">{items.map((x,idx)=>{const id=x.id!==undefined?x.id:idx;return(<div key={id} className="flex items-center gap-3 p-2.5 rounded-xl bg-gray-50 hover:bg-gray-100"><div className="flex-1 min-w-0"><p className="font-bold text-xs text-gray-800 truncate">{x[cfg.fields[0].k]||x.title||x.text||`#${idx+1}`}</p>{x.date&&<p className="text-[10px] text-gray-400">{x.date}</p>}</div><div className="flex gap-1"><button onClick={()=>{setForm(Object.fromEntries(cfg.fields.map(f=>[f.k,x[f.k]||''])));setEditId(id);}} className="p-1.5 text-sky-600 hover:bg-sky-50 rounded-lg"><Edit size={13}/></button><button onClick={()=>del(id)} className="p-1.5 text-red-500 hover:bg-red-50 rounded-lg"><Trash2 size={13}/></button></div></div>);})}</div>}</div></div>);}

      </div>
      <div className="flex gap-2 mt-4">
        <button onClick={save} className="bg-amber-500 text-white px-6 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-amber-600 shadow-lg shadow-amber-500/20">{editId?<><Check size={13}/>حفظ</>:<><Plus size={13}/>إضافة</>}</button>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div><label className="block text-xs font-bold text-gray-600 mb-1">الاسم <span className="text-red-500">*</span></label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="أم عبدالله" className="w-full p-3 border rounded-xl text-sm border-gray-200"/></div>
        <div><label className="block text-xs font-bold text-gray-600 mb-1">الصفة</label><input value={form.relation} onChange={e=>setForm({...form,relation:e.target.value})} placeholder="ولي أمر / ولية أمر" className="w-full p-3 border rounded-xl text-sm border-gray-200"/></div>
        <div className="col-span-full"><label className="block text-xs font-bold text-gray-600 mb-1">الرأي <span className="text-red-500">*</span></label><textarea value={form.text} onChange={e=>setForm({...form,text:e.target.value})} rows={3} className="w-full p-3 border rounded-xl text-sm border-gray-200"/></div>
        <div><label className="block text-xs font-bold text-gray-600 mb-1">التقييم</label><div className="flex gap-1">{[1,2,3,4,5].map(n=><button key={n} onClick={()=>setForm({...form,rating:n})}><Star size={22} fill={n<=form.rating?'#fbbf24':'none'} className={n<=form.rating?'text-amber-400':'text-gray-300'}/></button>)}</div></div>
        <div><label className="block text-xs font-bold text-gray-600 mb-1">رابط الصورة</label><input value={form.image} onChange={e=>setForm({...form,image:e.target.value})} placeholder="اختياري" className="w-full p-3 border rounded-xl text-sm border-gray-200" dir="ltr"/></div>
      </div>
      <div className="flex gap-2 mt-4">
        <button onClick={save} className="bg-emerald-600 text-white px-6 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-emerald-700 shadow-lg shadow-emerald-600/20">{editId?<><Check size={13}/>حفظ</>:<><Plus size={13}/>إضافة</>}</button>
        {editId&&<button onClick={reset} className="bg-gray-200 text-gray-600 px-5 py-2.5 rounded-xl text-sm font-bold">إلغاء</button>}
      </div>
    </div>

    <div className="bg-white p-6 rounded-2xl shadow-sm">
      <h3 className="font-bold text-sm mb-4">الآراء ({items.length})</h3>
      {items.length===0?<p className="text-center py-8 text-gray-400 text-sm">لا آراء</p>:
      <div className="space-y-2">{items.map(t=>(
        <div key={t.id} className="flex items-center gap-4 p-3 bg-gray-50 rounded-xl">
          <img src={t.image||`https://ui-avatars.com/api/?name=${encodeURIComponent(t.name)}&background=065f46&color=fff`} className="w-10 h-10 rounded-full object-cover" onError={e=>{e.target.src=`https://ui-avatars.com/api/?name=${encodeURIComponent(t.name)}&background=065f46&color=fff`;}}/>
          <div className="flex-1 min-w-0"><div className="flex items-center gap-2"><p className="font-bold text-sm text-gray-800">{t.name}</p><div className="flex gap-0.5">{[...Array(t.rating||5)].map((_,i)=><Star key={i} size={10} fill="#fbbf24" className="text-amber-400"/>)}</div></div><p className="text-xs text-gray-500 truncate">{t.text}</p></div>
          <button onClick={()=>{setForm({name:t.name,relation:t.relation||'',text:t.text,rating:t.rating||5,image:t.image||''});setEditId(t.id);window.scrollTo({top:0,behavior:'smooth'});}} className="p-2 text-sky-600 hover:bg-sky-50 rounded-lg"><Edit size={13}/></button>
          <button onClick={()=>del(t.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg"><Trash2 size={13}/></button>
        </div>
      ))}</div>}
    </div>
  </div>);
}

/* ═══ Admin: Parent Portal ═══ */
function AParentPortal({data,setData,notify}){
  const portal = data.parentPortal || {enabled:true,message:'',announcements:[],students:[],messages:[]};
  const [tab, setTab] = useState('students');
  const [annText, setAnnText] = useState('');
  const [studentForm, setStudentForm] = useState({name:'',grade:'',parentName:'',accessCode:'',subjects:[],attendance:100,behavior:'ممتاز',notes:''});
  const [editId, setEditId] = useState(null);
  const [subjectForm, setSubjectForm] = useState({name:'',score1:0,score2:0});
  const [showForm, setShowForm] = useState(false);
  const [welcomeMsg, setWelcomeMsg] = useState(portal.message||'');
  const students = portal.students || [];
  const announcements = portal.announcements || [];
  const messages = portal.messages || [];
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(window.location.href.split('#')[0]+'#parentPortal')}&color=064e3b`;

  const generateCode = () => String(Math.floor(1000+Math.random()*9000));
  const resetForm = () => {setStudentForm({name:'',grade:'',parentName:'',accessCode:generateCode(),subjects:[],attendance:100,behavior:'ممتاز',notes:''});setEditId(null);setShowForm(false);};
  
  const addSubject = () => {
    if(!subjectForm.name.trim())return;
    setStudentForm({...studentForm,subjects:[...studentForm.subjects,{...subjectForm,score1:parseInt(subjectForm.score1)||0,score2:parseInt(subjectForm.score2)||0}]});
    setSubjectForm({name:'',score1:0,score2:0});
  };

  const saveStudent = () => {
    if(!studentForm.name.trim()||!studentForm.parentName.trim()){notify('اسم الطالب وولي الأمر مطلوبان','warning');return;}
    if(!studentForm.accessCode){studentForm.accessCode=generateCode();}
    if(editId!==null){
      setData({...data,parentPortal:{...portal,students:students.map(s=>s.id===editId?{...s,...studentForm}:s)}});
      notify('تم تعديل بيانات الطالب','success');
    } else {
      setData({...data,parentPortal:{...portal,students:[...students,{...studentForm,id:Date.now()}]}});
      notify('تمت إضافة الطالب','success');
    }
    resetForm();
  };

  const delStudent = (id) => {if(window.confirm('حذف هذا الطالب؟')){setData({...data,parentPortal:{...portal,students:students.filter(s=>s.id!==id)}});notify('تم الحذف');}};
  const editStudent = (s) => {setStudentForm({name:s.name,grade:s.grade,parentName:s.parentName,accessCode:s.accessCode,subjects:s.subjects||[],attendance:s.attendance||100,behavior:s.behavior||'',notes:s.notes||''});setEditId(s.id);setShowForm(true);};
  const addAnn=()=>{if(!annText.trim())return;setData({...data,parentPortal:{...portal,announcements:[...announcements,annText]}});setAnnText('');notify('تمت الإضافة');};
  const delAnn=(i)=>{setData({...data,parentPortal:{...portal,announcements:announcements.filter((_,j)=>j!==i)}});notify('تم الحذف');};
  const markRead=(id)=>{setData({...data,parentPortal:{...portal,messages:messages.map(m=>m.id===id?{...m,read:true}:m)}});};
  const delMsg=(id)=>{setData({...data,parentPortal:{...portal,messages:messages.filter(m=>m.id!==id)}});notify('تم الحذف');};
  const saveWelcome=()=>{setData({...data,parentPortal:{...portal,message:welcomeMsg}});notify('تم الحفظ');};

  return(<div>
    <h2 className="text-xl font-black text-gray-800 mb-1 flex items-center gap-2"><Shield size={22} className="text-emerald-500"/>بوابة أولياء الأمور</h2>
    <p className="text-sm text-gray-500 mb-6">إدارة بيانات الطلاب والدرجات وأكواد الدخول</p>

    {/* Stats */}
    <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
      <div className="bg-white p-3 rounded-2xl shadow-sm border-r-4 border-sky-500"><p className="text-[10px] text-gray-500 font-bold">طلاب</p><p className="text-xl font-black text-gray-800">{students.length}</p></div>
      <div className="bg-white p-3 rounded-2xl shadow-sm border-r-4 border-amber-500"><p className="text-[10px] text-gray-500 font-bold">إعلانات</p><p className="text-xl font-black text-gray-800">{announcements.length}</p></div>
      <div className="bg-white p-3 rounded-2xl shadow-sm border-r-4 border-emerald-500"><p className="text-[10px] text-gray-500 font-bold">رسائل جديدة</p><p className="text-xl font-black text-gray-800">{messages.filter(m=>!m.read).length}</p></div>
      <div className="bg-white p-3 rounded-2xl shadow-sm border-r-4 border-purple-500"><p className="text-[10px] text-gray-500 font-bold">رسائل الكل</p><p className="text-xl font-black text-gray-800">{messages.length}</p></div>
    </div>

    {/* Tabs */}
    <div className="flex gap-2 mb-6 flex-wrap">{[
      {k:'students',l:`👨‍🎓 الطلاب (${students.length})`},
      {k:'announcements',l:'📢 الإعلانات'},
      {k:'messages',l:`✉️ الرسائل ${messages.filter(m=>!m.read).length?`(${messages.filter(m=>!m.read).length})`:''}`},
      {k:'settings',l:'⚙️ الإعدادات'},
      {k:'qr',l:'📱 QR'}
    ].map(t=>(<button key={t.k} onClick={()=>setTab(t.k)} className={`px-4 py-2 rounded-xl text-xs font-bold transition ${tab===t.k?'bg-emerald-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>{t.l}</button>))}</div>

    {/* ═══ STUDENTS TAB ═══ */}
    {tab==='students'&&(<div>
      {!showForm ? (<>
        <button onClick={()=>{resetForm();setShowForm(true);setStudentForm(p=>({...p,accessCode:generateCode()}));}} className="bg-emerald-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold mb-4 flex items-center gap-2 hover:bg-emerald-700"><Plus size={14}/>إضافة طالب جديد</button>
        
        {students.length===0?<div className="bg-white rounded-2xl shadow-sm p-10 text-center"><Users size={40} className="text-gray-200 mx-auto mb-3"/><p className="text-gray-400 text-sm">لم يتم إضافة طلاب بعد</p></div>:
        <div className="space-y-3">{students.map(s=>{const avg=s.subjects?.length?Math.round(s.subjects.reduce((sum,x)=>sum+(x.score1||0),0)/s.subjects.length):0;return(
          <div key={s.id} className="bg-white rounded-2xl shadow-sm overflow-hidden hover:shadow-md transition">
            <div className="flex items-center gap-4 p-4">
              <div className="w-12 h-12 bg-gradient-to-br from-sky-400 to-sky-600 rounded-xl flex items-center justify-center text-white font-black text-lg flex-shrink-0">{s.name[0]}</div>
              <div className="flex-1 min-w-0">
                <p className="font-bold text-sm text-gray-800">{s.name}</p>
                <p className="text-[10px] text-gray-500">{s.grade} · ولي الأمر: {s.parentName}</p>
                <div className="flex flex-wrap gap-1 mt-1">{(s.subjects||[]).map((sub,j)=>(<span key={j} className={`text-[8px] px-1.5 py-0.5 rounded font-bold ${sub.score1>=90?'bg-emerald-100 text-emerald-700':sub.score1>=70?'bg-sky-100 text-sky-700':'bg-amber-100 text-amber-700'}`}>{sub.name}: {sub.score1}</span>))}</div>
              </div>
              <div className="text-center flex-shrink-0">
                <div className="bg-sky-50 rounded-lg px-3 py-1.5 mb-1"><p className="text-sm font-black text-sky-700">{avg}%</p></div>
                <p className="text-[8px] text-gray-400 font-bold bg-gray-100 px-2 py-0.5 rounded" dir="ltr">كود: {s.accessCode}</p>
              </div>
              <div className="flex flex-col gap-1 flex-shrink-0">
                <button onClick={()=>editStudent(s)} className="p-1.5 text-sky-600 hover:bg-sky-50 rounded-lg"><Edit size={14}/></button>
                <button onClick={()=>delStudent(s.id)} className="p-1.5 text-red-500 hover:bg-red-50 rounded-lg"><Trash2 size={14}/></button>
              </div>
            </div>
          </div>
        );})}</div>}
      </>) : (
        <div className="space-y-4">
          <div className="flex items-center justify-between"><h3 className="font-bold text-sm text-gray-800">{editId?'تعديل بيانات الطالب':'إضافة طالب جديد'}</h3><button onClick={resetForm} className="text-xs text-gray-500 hover:text-gray-700">✕ إلغاء</button></div>
          
          {/* Basic Info */}
          <div className="bg-white rounded-2xl shadow-sm p-5 border-t-4 border-sky-500">
            <h4 className="font-bold text-xs text-gray-600 mb-3">البيانات الأساسية</h4>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div><label className="block text-[10px] font-bold text-gray-500 mb-1">اسم الطالب *</label><input value={studentForm.name} onChange={e=>setStudentForm({...studentForm,name:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200" placeholder="مثال: علي محمد"/></div>
              <div><label className="block text-[10px] font-bold text-gray-500 mb-1">الصف</label><input value={studentForm.grade} onChange={e=>setStudentForm({...studentForm,grade:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200" placeholder="مثال: الصف الخامس"/></div>
              <div><label className="block text-[10px] font-bold text-gray-500 mb-1">ولي الأمر *</label><input value={studentForm.parentName} onChange={e=>setStudentForm({...studentForm,parentName:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200" placeholder="اسم ولي الأمر"/></div>
              <div><label className="block text-[10px] font-bold text-gray-500 mb-1">كود الدخول</label><div className="flex gap-2"><input value={studentForm.accessCode} onChange={e=>setStudentForm({...studentForm,accessCode:e.target.value.replace(/\D/g,'').slice(0,6)})} className="flex-1 p-2.5 border rounded-xl text-sm border-gray-200 text-center font-black tracking-widest" dir="ltr"/><button type="button" onClick={()=>setStudentForm({...studentForm,accessCode:generateCode()})} className="px-3 py-2 bg-gray-100 rounded-xl text-xs text-gray-600 hover:bg-gray-200">🔄</button></div></div>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mt-3">
              <div><label className="block text-[10px] font-bold text-gray-500 mb-1">نسبة الحضور %</label><input type="number" min="0" max="100" value={studentForm.attendance} onChange={e=>setStudentForm({...studentForm,attendance:parseInt(e.target.value)||0})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200"/></div>
              <div><label className="block text-[10px] font-bold text-gray-500 mb-1">السلوك</label><select value={studentForm.behavior} onChange={e=>setStudentForm({...studentForm,behavior:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200"><option>ممتاز</option><option>جيد جداً</option><option>جيد</option><option>مقبول</option><option>ضعيف</option></select></div>
              <div><label className="block text-[10px] font-bold text-gray-500 mb-1">ملاحظات</label><input value={studentForm.notes} onChange={e=>setStudentForm({...studentForm,notes:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200" placeholder="ملاحظات اختيارية"/></div>
            </div>
          </div>

          {/* Subjects & Grades */}
          <div className="bg-white rounded-2xl shadow-sm p-5 border-t-4 border-amber-500">
            <h4 className="font-bold text-xs text-gray-600 mb-3 flex items-center gap-2"><FileText size={14} className="text-amber-500"/>المواد والدرجات ({studentForm.subjects.length})</h4>
            <div className="flex gap-2 mb-3 flex-wrap">
              <input value={subjectForm.name} onChange={e=>setSubjectForm({...subjectForm,name:e.target.value})} placeholder="اسم المادة" className="flex-1 min-w-[120px] p-2.5 border rounded-xl text-xs border-gray-200"/>
              <input type="number" min="0" max="100" value={subjectForm.score1} onChange={e=>setSubjectForm({...subjectForm,score1:e.target.value})} placeholder="ف1" className="w-20 p-2.5 border rounded-xl text-xs border-gray-200 text-center"/>
              <input type="number" min="0" max="100" value={subjectForm.score2} onChange={e=>setSubjectForm({...subjectForm,score2:e.target.value})} placeholder="ف2" className="w-20 p-2.5 border rounded-xl text-xs border-gray-200 text-center"/>
              <button type="button" onClick={addSubject} className="bg-amber-500 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-amber-600"><Plus size={12}/></button>
            </div>
            {studentForm.subjects.length===0?<p className="text-xs text-gray-400 text-center py-3">لم يتم إضافة مواد بعد</p>:
            <div className="space-y-1.5">{studentForm.subjects.map((s,i)=>(<div key={i} className="flex items-center gap-3 p-2.5 bg-gray-50 rounded-xl"><span className="font-bold text-xs text-gray-800 flex-1">{s.name}</span><span className="text-xs font-bold text-sky-600 bg-sky-50 px-2 py-0.5 rounded">ف1: {s.score1}</span><span className="text-xs font-bold text-gray-400 bg-gray-100 px-2 py-0.5 rounded">ف2: {s.score2||'-'}</span><button type="button" onClick={()=>setStudentForm({...studentForm,subjects:studentForm.subjects.filter((_,j)=>j!==i)})} className="p-1 text-red-500 hover:bg-red-50 rounded"><X size={12}/></button></div>))}</div>}
          </div>

          <button onClick={saveStudent} className="w-full bg-emerald-600 text-white py-3 rounded-2xl font-bold text-sm hover:bg-emerald-700 flex items-center justify-center gap-2"><Save size={14}/>{editId?'حفظ التعديلات':'إضافة الطالب'}</button>
        </div>
      )}
    </div>)}

    {/* ═══ ANNOUNCEMENTS TAB ═══ */}
    {tab==='announcements'&&(<div className="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-amber-500">
      <h3 className="font-bold text-sm mb-4">📢 إعلانات البوابة</h3>
      <div className="flex gap-2 mb-4"><input value={annText} onChange={e=>setAnnText(e.target.value)} placeholder="نص الإعلان الجديد..." className="flex-1 p-3 border rounded-xl text-sm border-gray-200" onKeyDown={e=>e.key==='Enter'&&addAnn()}/><button onClick={addAnn} className="bg-amber-500 text-white px-5 py-2.5 rounded-xl text-sm font-bold"><Plus size={14}/></button></div>
      {announcements.length===0?<p className="text-center py-6 text-gray-400 text-sm">لا إعلانات</p>:
      <div className="space-y-2">{announcements.map((a,i)=>(<div key={i} className="flex items-center gap-3 p-3 bg-gray-50 rounded-xl"><span className="text-amber-500">📌</span><p className="flex-1 text-sm text-gray-700">{a}</p><button onClick={()=>delAnn(i)} className="p-1.5 text-red-500 hover:bg-red-50 rounded-lg"><Trash2 size={13}/></button></div>))}</div>}
    </div>)}

    {/* ═══ MESSAGES TAB ═══ */}
    {tab==='messages'&&(<div className="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-emerald-500">
      <h3 className="font-bold text-sm mb-4 flex items-center gap-2"><Mail size={16} className="text-emerald-500"/>رسائل أولياء الأمور</h3>
      {messages.length===0?<div className="text-center py-10"><Mail size={36} className="text-gray-200 mx-auto mb-3"/><p className="text-gray-400 text-sm">لا رسائل واردة</p></div>:
      <div className="space-y-3">{messages.map(m=>(
        <div key={m.id} className={`p-4 rounded-xl border ${m.read?'bg-gray-50 border-gray-100':'bg-emerald-50 border-emerald-200'}`}>
          <div className="flex items-start justify-between gap-3">
            <div className="flex-1">
              <div className="flex items-center gap-2 mb-1"><p className="font-bold text-sm text-gray-800">{m.parent}</p>{!m.read&&<span className="w-2 h-2 bg-emerald-500 rounded-full"/>}{m.subject&&<span className="text-[9px] bg-gray-200 text-gray-600 px-2 py-0.5 rounded font-bold">{m.subject}</span>}</div>
              {(m.student||m.grade)&&<p className="text-[10px] text-gray-500 mb-1">الطالب: {m.student||'-'} · {m.grade||'-'}{m.phone?` · ${m.phone}`:''}</p>}
              <p className="text-sm text-gray-700 leading-relaxed mt-2">{m.message}</p>
              <p className="text-[9px] text-gray-400 mt-2">{m.date} - {m.time}</p>
            </div>
            <div className="flex gap-1 flex-shrink-0">
              {!m.read&&<button onClick={()=>markRead(m.id)} className="p-1.5 bg-emerald-100 text-emerald-600 rounded-lg hover:bg-emerald-200" title="تمت القراءة"><Check size={12}/></button>}
              <button onClick={()=>delMsg(m.id)} className="p-1.5 bg-red-50 text-red-500 rounded-lg hover:bg-red-100"><Trash2 size={12}/></button>
            </div>
          </div>
        </div>
      ))}</div>}
    </div>)}

    {/* ═══ SETTINGS TAB ═══ */}
    {tab==='settings'&&(<div className="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-gray-400">
      <h3 className="font-bold text-sm mb-4">⚙️ إعدادات البوابة</h3>
      <div><label className="block text-xs font-bold text-gray-600 mb-1">رسالة الترحيب</label><textarea value={welcomeMsg} onChange={e=>setWelcomeMsg(e.target.value)} rows={2} className="w-full p-3 border rounded-xl text-sm border-gray-200"/></div>
      <button onClick={saveWelcome} className="bg-emerald-600 text-white px-6 py-2.5 rounded-xl text-sm font-bold mt-3 flex items-center gap-2"><Save size={14}/>حفظ</button>
    </div>)}

    {/* ═══ QR TAB ═══ */}
    {tab==='qr'&&(<div className="bg-white p-6 rounded-2xl shadow-sm text-center border-t-4 border-purple-500">
      <h3 className="font-bold text-sm mb-4">📱 QR Code للبوابة</h3>
      <img src={qrUrl} alt="QR" className="w-48 h-48 mx-auto rounded-2xl shadow-lg mb-4"/>
      <p className="text-xs text-gray-500 mb-3">يمكن لأولياء الأمور مسح هذا الرمز للوصول للبوابة</p>
      <a href={qrUrl} download="parent-portal-qr.png" className="inline-flex items-center gap-2 bg-purple-600 text-white px-5 py-2 rounded-xl text-sm font-bold hover:bg-purple-700"><ImageIcon size={14}/>تحميل QR</a>
    </div>)}
  </div>);
}

function AAlumni({data,setData,notify}){
  const items = data.alumni || [];
  const pending = items.filter(a=>a.status==='pending');
  const published = items.filter(a=>a.status==='published');
  const [form, setForm] = useState({name:'',gradYear:'',job:'',image:'',memory:'',status:'published'});
  const [editId, setEditId] = useState(null);
  const reset = ()=>{setForm({name:'',gradYear:'',job:'',image:'',memory:'',status:'published'});setEditId(null);};

  const save=()=>{
    if(!form.name.trim()){notify('الاسم مطلوب','warning');return;}
    if(editId!==null){setData({...data,alumni:items.map(i=>i.id===editId?{...i,...form}:i)});notify('تم التعديل','success');}
    else{setData({...data,alumni:[{...form,id:Date.now()},...items]});notify('تمت الإضافة','success');}
    reset();
  };
  const del=(id)=>{if(confirm('حذف؟')){setData({...data,alumni:items.filter(i=>i.id!==id)});notify('تم');}};
  const approve=(id)=>{setData({...data,alumni:items.map(i=>i.id===id?{...i,status:'published'}:i)});notify('تم النشر ✅');};
  const reject=(id)=>{setData({...data,alumni:items.filter(i=>i.id!==id)});notify('تم الرفض');};

    {pending.length>0&&(<div className="bg-amber-50 border border-amber-200 rounded-2xl p-5 mb-6">
      <h3 className="font-bold text-sm text-amber-700 mb-3 flex items-center gap-2"><Clock size={14}/>بانتظار الموافقة ({pending.length})</h3>

        <div key={a.id} className="flex items-center gap-3 p-3 bg-white rounded-xl border border-amber-100">
          <img src={a.image||`https://ui-avatars.com/api/?name=${encodeURIComponent(a.name)}&background=3730a3&color=c7d2fe`} className="w-10 h-10 rounded-full object-cover"/>
          <div className="flex-1"><p className="font-bold text-sm">{a.name} {a.gradYear&&`(${a.gradYear})`}</p><p className="text-[10px] text-gray-500">{a.job}</p><p className="text-[10px] text-gray-400 italic">"{(a.memory||'').substring(0,60)}..."</p></div>
          <button onClick={()=>approve(a.id)} className="p-2 bg-emerald-100 text-emerald-600 rounded-lg hover:bg-emerald-200"><Check size={14}/></button>
          <button onClick={()=>reject(a.id)} className="p-2 bg-red-100 text-red-500 rounded-lg hover:bg-red-200"><X size={14}/></button>
        </div>
      ))}</div>
    </div>)}

    {/* Add Form */}
    <div className="bg-white p-6 rounded-2xl shadow-sm mb-6 border-t-4 border-indigo-500">
      <h3 className="font-bold text-sm mb-4">{editId?'تعديل':'إضافة خريج يدوياً'}</h3>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
        <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="الاسم *" className="p-3 border rounded-xl text-sm border-gray-200"/>
        <input value={form.gradYear} onChange={e=>setForm({...form,gradYear:e.target.value})} placeholder="سنة التخرج" className="p-3 border rounded-xl text-sm border-gray-200"/>
        <input value={form.job} onChange={e=>setForm({...form,job:e.target.value})} placeholder="الوظيفة" className="p-3 border rounded-xl text-sm border-gray-200"/>
        <input value={form.image} onChange={e=>setForm({...form,image:e.target.value})} placeholder="رابط الصورة" className="p-3 border rounded-xl text-sm border-gray-200" dir="ltr"/>
        <textarea value={form.memory} onChange={e=>setForm({...form,memory:e.target.value})} placeholder="الذكرى / كلمة عن المدرسة" rows={2} className="col-span-full p-3 border rounded-xl text-sm border-gray-200"/>
      </div>
      <div className="flex gap-2 mt-4">
        <button onClick={save} className="bg-indigo-600 text-white px-6 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-indigo-700 shadow-lg shadow-indigo-600/20">{editId?<><Check size={13}/>حفظ</>:<><Plus size={13}/>إضافة</>}</button>
        {editId&&<button onClick={reset} className="bg-gray-200 text-gray-600 px-5 py-2.5 rounded-xl text-sm font-bold">إلغاء</button>}
      </div>
    </div>

    {/* Published List */}
    <div className="bg-white p-6 rounded-2xl shadow-sm">
      <h3 className="font-bold text-sm mb-4">المنشورون ({published.length})</h3>
      {published.length===0?<p className="text-center py-8 text-gray-400 text-sm">لا خريجين منشورين</p>:
      <div className="space-y-2">{published.map(a=>(
        <div key={a.id} className="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
          <img src={a.image||`https://ui-avatars.com/api/?name=${encodeURIComponent(a.name)}&background=3730a3&color=c7d2fe`} className="w-10 h-10 rounded-full object-cover"/>
          <div className="flex-1"><p className="font-bold text-sm">{a.name}</p><p className="text-[10px] text-indigo-500">{a.job||'لم يحدد'} · {a.gradYear||''}</p></div>
          <button onClick={()=>{setForm(a);setEditId(a.id);window.scrollTo({top:0,behavior:'smooth'});}} className="p-2 text-sky-600 hover:bg-sky-50 rounded-lg"><Edit size={13}/></button>
          <button onClick={()=>del(a.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg"><Trash2 size={13}/></button>
        </div>
      ))}</div>}
    </div>
  </div>);
}

          </div>
          <div><label className="block text-xs font-bold text-gray-600 mb-1">وصف الفريق</label><textarea value={form.description} onChange={e=>setForm({...form,description:e.target.value})} rows={2} className="w-full p-3 border rounded-xl text-sm border-gray-200" placeholder="وصف مختصر عن الفريق وأهدافه"/></div>

            ))}</div>
          </div>

          <div className="flex items-center gap-2"><input type="checkbox" checked={form.active} onChange={e=>setForm({...form,active:e.target.checked})} className="rounded"/><label className="text-xs font-bold text-gray-600">فريق نشط (يظهر في الموقع)</label></div>

      </div>

      {/* Supervisors - from Staff */}
      <div className="bg-white rounded-2xl shadow-sm p-5 border-t-4 border-emerald-500">
        <h3 className="font-bold text-sm mb-2 flex items-center gap-2"><GraduationCap size={16} className="text-emerald-500"/>المعلمون المشرفون</h3>
        <p className="text-[10px] text-gray-400 mb-3">اختر من الكادر المدرسي المسجل (يمكن اختيار أكثر من مشرف)</p>
        {staff.length===0?<p className="text-xs text-gray-400 bg-gray-50 rounded-xl p-4 text-center">لم يتم إضافة أي عضو في الكادر المدرسي بعد. أضف المعلمين أولاً من قسم "طاقم المدرسة".</p>:
        <div className="grid grid-cols-1 md:grid-cols-2 gap-2 max-h-64 overflow-y-auto">
          {staff.map(s=>{
            const selected = form.supervisors.includes(s.id);
            return(
              <button key={s.id} type="button" onClick={()=>toggleSupervisor(s.id)} className={`flex items-center gap-3 p-3 rounded-xl text-right transition-all ${selected?'bg-emerald-50 ring-2 ring-emerald-400 shadow':'bg-gray-50 hover:bg-gray-100 border border-gray-100'}`}>
                <div className="relative flex-shrink-0">
                  <img src={s.image||`https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}&size=48&background=064e3b&color=fff`} className="w-10 h-10 rounded-xl object-cover object-top" onError={e=>{e.target.src=`https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}&size=48&background=064e3b&color=fff`;}}/>
                  {selected&&<div className="absolute -top-1 -right-1 w-5 h-5 bg-emerald-500 rounded-full flex items-center justify-center"><Check size={10} className="text-white"/></div>}
                </div>
                <div className="flex-1 min-w-0"><p className="text-xs font-bold text-gray-800 truncate">{s.name}</p><p className="text-[10px] text-gray-500">{s.role}{s.category?` · ${s.category}`:''}</p></div>
              </button>
            );
          })}
        </div>}
        {form.supervisors.length>0&&<p className="text-[10px] text-emerald-600 font-bold mt-2">✅ تم اختيار {form.supervisors.length} مشرف</p>}
      </div>

      {/* Members */}
      <div className="bg-white rounded-2xl shadow-sm p-5 border-t-4 border-sky-500">
        <h3 className="font-bold text-sm mb-3 flex items-center gap-2"><Users size={16} className="text-sky-500"/>أعضاء الفريق ({form.members.length})</h3>
        
        {/* Add Member Form */}
        <div className="bg-sky-50 rounded-xl p-3 mb-4">
          <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-2 mb-2">
            <input value={memberForm.name} onChange={e=>setMemberForm({...memberForm,name:e.target.value})} placeholder="اسم الطالب *" className="p-2.5 border rounded-xl text-xs border-sky-200 bg-white"/>
            <input value={memberForm.grade} onChange={e=>setMemberForm({...memberForm,grade:e.target.value})} placeholder="الصف" className="p-2.5 border rounded-xl text-xs border-sky-200 bg-white"/>
            <select value={memberForm.role} onChange={e=>setMemberForm({...memberForm,role:e.target.value})} className="p-2.5 border rounded-xl text-xs border-sky-200 bg-white">
              <option>عضو</option><option>قائد الفريق</option><option>نائب القائد</option><option>مبرمج</option><option>مصمم</option><option>باحث</option><option>منسق</option>
            </select>
            <input value={memberForm.image} onChange={e=>setMemberForm({...memberForm,image:e.target.value})} placeholder="صورة (اختياري)" className="p-2.5 border rounded-xl text-xs border-sky-200 bg-white" dir="ltr"/>
          </div>
          <button type="button" onClick={addMember} className="bg-sky-500 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-sky-600 flex items-center gap-1"><Plus size={12}/>إضافة عضو</button>
        </div>

        {/* Members List */}
        {form.members.length===0?<p className="text-xs text-gray-400 text-center py-4">لم يتم إضافة أعضاء بعد</p>:
        <div className="space-y-2 max-h-60 overflow-y-auto">{form.members.map((m,i)=>(
          <div key={i} className="flex items-center gap-3 p-2.5 bg-gray-50 rounded-xl">
            <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-sky-400 to-sky-600 flex items-center justify-center text-white text-[10px] font-black flex-shrink-0 overflow-hidden">
              {m.image?<img src={m.image} className="w-full h-full object-cover"/>:(m.name||'?')[0]}
            </div>
            <div className="flex-1 min-w-0"><p className="text-xs font-bold text-gray-800 truncate">{m.name}</p><p className="text-[9px] text-gray-500">{m.grade} · {m.role}</p></div>
            <button type="button" onClick={()=>removeMember(i)} className="p-1.5 bg-red-50 text-red-500 rounded-lg hover:bg-red-100"><X size={12}/></button>
          </div>
        ))}</div>}
      </div>

      {/* Achievements */}
      <div className="bg-white rounded-2xl shadow-sm p-5 border-t-4 border-amber-500">
        <h3 className="font-bold text-sm mb-3 flex items-center gap-2"><Trophy size={16} className="text-amber-500"/>إنجازات الفريق ({form.achievements.length})</h3>
        <div className="flex gap-2 mb-3">
          <input value={achForm} onChange={e=>setAchForm(e.target.value)} placeholder="أضف إنجاز..." className="flex-1 p-2.5 border rounded-xl text-xs border-gray-200" onKeyDown={e=>e.key==='Enter'&&(e.preventDefault(),addAch())}/>
          <button type="button" onClick={addAch} className="bg-amber-500 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-amber-600"><Plus size={12}/></button>
        </div>
        {form.achievements.length>0&&<div className="space-y-1">{form.achievements.map((a,i)=>(
          <div key={i} className="flex items-center gap-2 p-2 bg-amber-50 rounded-lg"><span className="text-xs">🏆</span><p className="flex-1 text-xs text-gray-700">{a}</p><button type="button" onClick={()=>removeAch(i)} className="text-red-400 hover:text-red-600"><X size={12}/></button></div>
        ))}</div>}
      </div>

      {/* Preview */}
      <div className="bg-gray-900 rounded-2xl p-5">
        <p className="text-[10px] text-gray-500 mb-3 font-bold">معاينة</p>
        <div className="bg-white rounded-2xl overflow-hidden max-w-sm mx-auto shadow-lg">
          <div className={`h-28 bg-gradient-to-l ${colorGrad[form.color]||'from-sky-500 to-sky-700'} flex items-center justify-center`}>
            <span className="text-5xl">{form.icon}</span>
          </div>
          <div className="p-4"><h4 className="font-black text-gray-800 mb-1">{form.name||'اسم الفريق'}</h4><p className="text-[10px] text-gray-500 mb-2">{form.description||'وصف الفريق'}</p>
          <div className="flex items-center gap-2"><span className="text-[9px] bg-sky-50 text-sky-600 px-2 py-0.5 rounded font-bold">👥 {form.members.length} عضو</span><span className="text-[9px] bg-emerald-50 text-emerald-600 px-2 py-0.5 rounded font-bold">👨‍🏫 {form.supervisors.length} مشرف</span><span className="text-[9px] bg-amber-50 text-amber-600 px-2 py-0.5 rounded font-bold">🏆 {form.achievements.length} إنجاز</span></div></div>
        </div>
      </div>

      {/* Save Button */}
      <button onClick={save} className="w-full bg-gradient-to-l from-sky-600 to-sky-700 text-white py-3.5 rounded-2xl font-bold text-sm hover:shadow-lg transition flex items-center justify-center gap-2 shadow-lg shadow-sky-600/20"><Save size={16}/>{editId?'حفظ التعديلات':'إضافة الفريق'}</button>
    </div>)}
  </div>);
}

function ALearningSupport({data,setData,notify}){

  const [gForm, setGForm] = useState({src:'',caption:''});

  const update=(newLs)=>setData({...data,learningSupport:newLs});

  return(<div>
    <h2 className="text-xl font-black text-gray-800 mb-1 flex items-center gap-2"><Heart size={22} className="text-teal-500"/>قسم دعم التعلم</h2>
    <p className="text-sm text-gray-500 mb-6">رعاية طلاب صعوبات التعلم</p>
    <div className="flex gap-2 mb-6 flex-wrap">{[{k:'intro',l:'النبذة'},{k:'specialists',l:'المتخصصون'},{k:'articles',l:'المقالات'},{k:'gallery',l:'الصور'}].map(t=>(
      <button key={t.k} onClick={()=>setTab(t.k)} className={`px-4 py-2 rounded-xl text-xs font-bold ${tab===t.k?'bg-teal-600 text-white':'bg-gray-100 text-gray-600'}`}>{t.l}</button>
    ))}</div>

    {tab==='intro'&&(<div className="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-teal-500"><label className="block text-xs font-bold text-gray-600 mb-1">نبذة عن القسم</label><textarea value={ls.intro} onChange={e=>update({...ls,intro:e.target.value})} rows={4} className="w-full p-3 border rounded-xl text-sm border-gray-200 mb-3"/><button onClick={()=>notify('تم الحفظ','success')} className="bg-teal-600 text-white px-6 py-2.5 rounded-xl text-sm font-bold"><Save size={14} className="inline mr-1"/>حفظ</button></div>)}

    {tab==='specialists'&&(<div className="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-teal-500">
      <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
        <input value={sForm.name} onChange={e=>setSForm({...sForm,name:e.target.value})} placeholder="اسم المتخصص" className="p-3 border rounded-xl text-sm border-gray-200"/>
        <input value={sForm.role} onChange={e=>setSForm({...sForm,role:e.target.value})} placeholder="التخصص" className="p-3 border rounded-xl text-sm border-gray-200"/>
        <input value={sForm.image} onChange={e=>setSForm({...sForm,image:e.target.value})} placeholder="رابط الصورة" className="p-3 border rounded-xl text-sm border-gray-200" dir="ltr"/>
      </div>
      <button onClick={()=>{if(!sForm.name.trim())return notify('الاسم مطلوب','warning');update({...ls,specialists:[...ls.specialists,{...sForm,id:Date.now()}]});setSForm({name:'',role:'',image:''});notify('تمت الإضافة');}} className="bg-teal-600 text-white px-5 py-2 rounded-xl text-sm font-bold mb-4"><Plus size={13} className="inline mr-1"/>إضافة</button>
      <div className="space-y-2">{ls.specialists.map(s=>(
        <div key={s.id} className="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
          <img src={s.image||`https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}&background=0d9488&color=fff`} className="w-10 h-10 rounded-full object-cover"/>
          <div className="flex-1"><p className="font-bold text-sm">{s.name}</p><p className="text-xs text-teal-600">{s.role}</p></div>
          <button onClick={()=>{update({...ls,specialists:ls.specialists.filter(x=>x.id!==s.id)});notify('تم الحذف');}} className="p-2 text-red-500 hover:bg-red-50 rounded-lg"><Trash2 size={13}/></button>
        </div>
      ))}</div>
    </div>)}

    {tab==='articles'&&(<div className="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-teal-500">
      <div className="space-y-3 mb-4">
        <input value={aForm.title} onChange={e=>setAForm({...aForm,title:e.target.value})} placeholder="عنوان المقال" className="w-full p-3 border rounded-xl text-sm border-gray-200"/>
        <textarea value={aForm.content} onChange={e=>setAForm({...aForm,content:e.target.value})} placeholder="محتوى المقال" rows={3} className="w-full p-3 border rounded-xl text-sm border-gray-200"/>
      </div>
      <button onClick={()=>{if(!aForm.title.trim())return notify('العنوان مطلوب','warning');update({...ls,articles:[{...aForm,id:Date.now()},...ls.articles]});setAForm({title:'',content:'',date:new Date().toISOString().split('T')[0]});notify('تمت الإضافة');}} className="bg-teal-600 text-white px-5 py-2 rounded-xl text-sm font-bold mb-4"><Plus size={13} className="inline mr-1"/>إضافة</button>
      <div className="space-y-2">{ls.articles.map(a=>(
        <div key={a.id} className="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
          <div className="flex-1"><p className="font-bold text-sm">{a.title}</p><p className="text-[10px] text-gray-400">{a.date}</p></div>
          <button onClick={()=>{update({...ls,articles:ls.articles.filter(x=>x.id!==a.id)});notify('تم الحذف');}} className="p-2 text-red-500 hover:bg-red-50 rounded-lg"><Trash2 size={13}/></button>
        </div>
      ))}</div>
    </div>)}

    {tab==='gallery'&&(<div className="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-teal-500">
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
        <input value={gForm.src} onChange={e=>setGForm({...gForm,src:e.target.value})} placeholder="رابط الصورة" className="p-3 border rounded-xl text-sm border-gray-200" dir="ltr"/>
        <input value={gForm.caption} onChange={e=>setGForm({...gForm,caption:e.target.value})} placeholder="وصف الصورة" className="p-3 border rounded-xl text-sm border-gray-200"/>
      </div>
      <button onClick={()=>{if(!gForm.src.trim())return notify('الرابط مطلوب','warning');update({...ls,gallery:[...ls.gallery,{...gForm,id:Date.now()}]});setGForm({src:'',caption:''});notify('تمت الإضافة');}} className="bg-teal-600 text-white px-5 py-2 rounded-xl text-sm font-bold mb-4"><Plus size={13} className="inline mr-1"/>إضافة</button>
      <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">{ls.gallery.map(p=>(
        <div key={p.id} className="relative group rounded-xl overflow-hidden">
          <img src={p.src} className="w-full h-24 object-cover"/>
          <button onClick={()=>{update({...ls,gallery:ls.gallery.filter(x=>x.id!==p.id)});notify('تم الحذف');}} className="absolute top-1 left-1 w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition"><X size={10}/></button>
        </div>
      ))}</div>
    </div>)}
  </div>);
}

function ASocialLinks({data,setData,notify}){
  const links = data.socialLinks || [];
  const [form, setForm] = useState({platform:'facebook',url:'',label:''});
  const [editId, setEditId] = useState(null);
  const reset = () => { setForm({platform:'facebook',url:'',label:''}); setEditId(null); };
  const platforms = Object.entries(SOCIAL_PLATFORMS);

  const save = () => {
    if(!form.url.trim()){notify('أدخل الرابط','warning');return;}
    if(!form.url.startsWith('http')){notify('الرابط يجب أن يبدأ بـ https://','warning');return;}
    const p = SOCIAL_PLATFORMS[form.platform];
    const finalLabel = form.label.trim() || (p ? p.name : form.platform);
    if(editId!==null){
      setData({...data,socialLinks:links.map(l=>l.id===editId?{...l,...form,label:finalLabel}:l)});
      notify('تم التعديل','success');
    } else {
      setData({...data,socialLinks:[...links,{...form,label:finalLabel,id:Date.now()}]});
      notify('تمت الإضافة','success');
    }
    reset();
  };
  const del=(id)=>{if(window.confirm('حذف هذا الحساب؟')){setData({...data,socialLinks:links.filter(l=>l.id!==id)});notify('تم الحذف');}};

  return(<div>
    <h2 className="text-xl font-black text-gray-800 mb-1 flex items-center gap-2"><Share2 size={22} className="text-sky-500"/>مواقع التواصل الاجتماعي</h2>
    <p className="text-sm text-gray-500 mb-6">تظهر في صفحة "اتصل بنا" وأسفل الموقع</p>

    {/* Add/Edit Form */}
    <div className="bg-white p-6 rounded-2xl shadow-sm mb-6 border-t-4 border-sky-500">
      <h3 className="font-bold text-sm mb-4 flex items-center gap-2">{editId!==null?<><Edit size={14} className="text-amber-600"/>تعديل حساب</>:<><Plus size={14} className="text-sky-500"/>إضافة حساب جديد</>}</h3>

      {/* Platform Selection - Visual Cards */}
      <div className="mb-4">
        <label className="block text-xs font-bold text-gray-600 mb-2">اختر المنصة</label>
        <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-2">
          {platforms.map(([key, p]) => (
            <button key={key} onClick={() => setForm({...form, platform:key, label:p.name})}
              className={`p-3 rounded-xl border-2 text-center transition-all flex flex-col items-center gap-1.5 ${form.platform===key?'border-gray-800 shadow-lg scale-[1.03]':'border-gray-100 hover:border-gray-300'}`}>
              <div className="w-9 h-9 rounded-lg flex items-center justify-center text-white" style={{backgroundColor:p.color}}>{p.icon}</div>
              <span className="text-[10px] font-bold text-gray-700">{p.name}</span>
              {form.platform===key && <Check size={12} className="text-emerald-500"/>}
            </button>
          ))}
        </div>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label className="block text-xs font-bold text-gray-600 mb-1">رابط الحساب <span className="text-red-500">*</span></label>
          <input value={form.url} onChange={e=>setForm({...form,url:e.target.value})} placeholder={`https://${form.platform}.com/...`} className="w-full p-3 border rounded-xl text-sm border-gray-200 focus:border-sky-400 outline-none transition" dir="ltr"/>
        </div>
        <div>
          <label className="block text-xs font-bold text-gray-600 mb-1">اسم العرض (اختياري)</label>
          <input value={form.label} onChange={e=>setForm({...form,label:e.target.value})} placeholder={SOCIAL_PLATFORMS[form.platform]?.name||'اسم الحساب'} className="w-full p-3 border rounded-xl text-sm border-gray-200"/>
        </div>
      </div>

      {/* Live Preview */}
      {form.url && (()=>{
        const p = SOCIAL_PLATFORMS[form.platform];
        return p ? (
          <div className="mt-4 p-4 bg-gray-50 rounded-xl border flex items-center gap-3">
            <div className="w-11 h-11 rounded-xl flex items-center justify-center text-white shadow flex-shrink-0" style={{backgroundColor:p.color}}>{p.icon}</div>
            <div className="flex-1 min-w-0">
              <p className="font-bold text-sm text-gray-800">{form.label||p.name}</p>
              <p className="text-[10px] text-gray-400 truncate" dir="ltr">{form.url}</p>
            </div>
            <span className="text-[9px] bg-emerald-100 text-emerald-600 px-2 py-0.5 rounded-lg font-bold">معاينة</span>
          </div>
        ) : null;
      })()}

      <div className="flex gap-2 mt-4">
        <button onClick={save} className="bg-sky-600 text-white px-6 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-sky-700 transition shadow-lg shadow-sky-600/20">{editId!==null?<><Check size={13}/>حفظ</>:<><Plus size={13}/>إضافة</>}</button>
        {editId!==null&&<button onClick={reset} className="bg-gray-200 text-gray-600 px-5 py-2.5 rounded-xl text-sm font-bold">إلغاء</button>}
      </div>
    </div>

    {/* Links List */}
    <div className="bg-white p-6 rounded-2xl shadow-sm">
      <h3 className="font-bold text-sm mb-4 flex items-center gap-2"><Share2 size={14} className="text-sky-500"/>الحسابات ({links.length})</h3>
      {links.length===0 ? <div className="text-center py-10 text-gray-400"><Share2 size={36} className="mx-auto mb-2 opacity-20"/><p className="text-sm">لا توجد حسابات. أضف حسابات التواصل من النموذج أعلاه.</p></div> :
      <div className="space-y-2">{links.map(link=>{
        const p = SOCIAL_PLATFORMS[link.platform];
        if(!p) return null;
        return(
          <div key={link.id} className="flex items-center gap-4 p-3 rounded-xl bg-gray-50 hover:bg-gray-100 transition group">
            <div className="w-10 h-10 rounded-xl flex items-center justify-center text-white flex-shrink-0 shadow" style={{backgroundColor:p.color}}>{p.icon}</div>
            <div className="flex-1 min-w-0">
              <p className="font-bold text-sm text-gray-800">{link.label||p.name}</p>
              <p className="text-[10px] text-gray-400 truncate" dir="ltr">{link.url}</p>

function ASecurity({data,setData,notify}){const[u,setU]=useState('');const[p,setP]=useState('');const[c,setC]=useState('');const save=()=>{if(!u||!p){notify('أكمل الحقول','warning');return;}if(p!==c){notify('غير متطابقة','error');return;}if(p.length<6){notify('6 أحرف على الأقل','warning');return;}setData({...data,credentials:{username:u,passwordHash:Security.hashPassword(p)}});notify('تم التحديث');setU('');setP('');setC('');};const backup=()=>{const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`iqra-backup-${new Date().toISOString().split('T')[0]}.json`;a.click();notify('تم التصدير');};

function ChatWidget({data}){const[open,setOpen]=useState(false);const[msgs,setMsgs]=useState([{role:'bot',text:'مرحباً! 👋 أنا المساعد الذكي لمدرسة اقرأ الخاصة. اسألني أي شيء عن المدرسة وسأجيبك فوراً!'}]);const[inp,setInp]=useState('');const[loading,setLoading]=useState(false);const ref=useRef(null);const quick=['ما المراحل الدراسية؟','كيف أتواصل معكم؟','ما رؤية المدرسة؟','الوظائف المتاحة؟','أين تقع المدرسة؟'];useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[msgs]);

  const buildSchoolContext=()=>{const s=data.settings;const jobs=(data.jobs||[]).filter(j=>j.active);const news=data.news||[];const vids=data.videos||[];
    return `أنت المساعد الذكي لمدرسة اقرأ الخاصة. أجب بالعربية فقط بشكل مختصر وودود ومفيد.

الأخبار الحالية: ${news.slice(0,3).map(n=>n.title).join(' | ')||'لا أخبار'}
الوظائف الشاغرة: ${jobs.length>0?jobs.map(j=>`${j.title} - ${j.department}`).join(' | '):'لا وظائف متاحة حالياً'}

- كن ودوداً ومرحباً دائماً`;
  };

  const sendToAI=async(userMsg)=>{
    const history=msgs.filter(m=>m.role!=='system').slice(-8).map(m=>({role:m.role==='user'?'user':'assistant',content:m.text}));
    history.push({role:'user',content:userMsg});
    try{

      const d=await res.json();

  const fallbackAnswer=(q)=>{const l=q;const s=data.settings;if(l.includes('هاتف')||l.includes('تواصل')||l.includes('رقم'))return`📞 الهاتف: ${s.phone}\n📧 البريد: ${s.email}\n📍 الموقع: ${s.location}`;if(l.includes('رؤي'))return`👁️ رؤيتنا: ${s.vision}`;if(l.includes('رسال'))return`💎 رسالتنا: ${s.mission}`;if(l.includes('موقع')||l.includes('عنوان')||l.includes('وين'))return`📍 ${s.location}`;if(l.includes('مرحل')||l.includes('صفوف'))return`🎓 المراحل: ${s.grades}`;if(l.includes('وظ')||l.includes('عمل')||l.includes('توظيف'))return`💼 الوظائف الشاغرة:\n${(data.jobs||[]).filter(j=>j.active).map(j=>`• ${j.title} - ${j.department}`).join('\n')||'لا وظائف متاحة حالياً'}`;if(l.includes('اخبار')||l.includes('أخبار')||l.includes('جديد'))return`📰 آخر الأخبار:\n${(data.news||[]).slice(0,3).map(n=>`• ${n.title}`).join('\n')}`;return`شكراً لسؤالك! 😊\nللمزيد من المعلومات:\n📞 ${s.phone}\n📧 ${s.email}`;};

  const send=async(t=null)=>{const m=t||inp.trim();if(!m||loading)return;setMsgs(p=>[...p,{role:'user',text:m}]);setInp('');setLoading(true);
    const reply=await sendToAI(m);

  return(<div className="fixed bottom-6 left-6 z-[1000] flex flex-col items-start gap-3" dir="rtl">{open&&<div className="w-80 h-[480px] rounded-3xl shadow-2xl overflow-hidden flex flex-col border bg-white border-gray-200"><div className="bg-gradient-to-l from-emerald-800 to-emerald-700 p-4 text-white flex justify-between items-center"><div className="flex items-center gap-2"><div className="w-8 h-8 bg-white/20 rounded-xl flex items-center justify-center"><Bot size={16}/></div><div><span className="font-bold text-xs block">مساعد مدرسة اقرأ</span><span className="text-[8px] text-emerald-200 flex items-center gap-1"><Star size={8} fill="currentColor"/> مدعوم بالذكاء الاصطناعي</span></div></div><button onClick={()=>setOpen(false)} className="text-white/60 hover:text-white"><X size={16}/></button></div><div ref={ref} className="flex-1 p-4 overflow-y-auto space-y-3 bg-gray-50">{msgs.map((m,i)=>(<div key={i} className={`max-w-[85%] p-3 rounded-2xl text-xs leading-relaxed whitespace-pre-line ${m.role==='user'?'bg-emerald-600 text-white mr-auto rounded-bl-none':'bg-white text-gray-700 border border-gray-100 ml-auto rounded-br-none shadow-sm'}`}>{m.text}</div>))}{loading&&<div className="bg-white border p-3 rounded-2xl ml-auto w-16 flex gap-1 justify-center shadow-sm">{[0,1,2].map(i=><span key={i} className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{animationDelay:`${i*.15}s`}}/>)}</div>}{msgs.length===1&&<div className="flex flex-wrap gap-1">{quick.map((q,i)=>(<button key={i} onClick={()=>send(q)} className="text-[9px] px-2 py-1.5 rounded-lg font-bold bg-emerald-50 text-emerald-700">{q}</button>))}</div>}</div><div className="p-3 border-t flex gap-2 bg-white border-gray-100"><input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="اكتب سؤالك..." className="flex-1 px-3 py-2 rounded-xl border text-xs border-gray-200"/><button onClick={()=>send()} className="bg-amber-500 text-white w-8 h-8 rounded-xl flex items-center justify-center hover:bg-amber-600"><Send size={12}/></button></div></div>}<button onClick={()=>setOpen(!open)} className="w-14 h-14 bg-gradient-to-br from-amber-500 to-amber-600 text-white rounded-2xl flex items-center justify-center shadow-2xl hover:scale-110 active:scale-95 transition-transform">{open?<X size={22}/>:<MessageCircle size={22}/>}</button></div>);}

function App() {
  const [data, setData] = usePersistedState('iqraaV3', DEFAULT_DATA);
  const [page, setPage] = useState('home');
  const [dark, setDark] = useState(() => localStorage.getItem('iqraa-dark') === 'true');
  const [isAdmin, setIsAdmin] = useState(false);

  useEffect(()=>{const t=sessionStorage.getItem('authToken'),tm=sessionStorage.getItem('authTime');if(t&&tm&&(Date.now()-parseInt(tm))<7200000)setIsAdmin(true);},[]);
  useEffect(()=>{window.scrollTo({top:0,behavior:'smooth'});},[page]);
  useEffect(()=>{document.documentElement.classList.toggle('dark',dark);localStorage.setItem('iqraa-dark',dark);},[dark]);
  useEffect(()=>{
    const t=data.theme;if(!t)return;
    let s=document.getElementById('dyn-theme');if(!s){s=document.createElement('style');s.id='dyn-theme';document.head.appendChild(s);}
    s.textContent=`
      :root { --color-primary: ${t.primaryColor||'#065f46'}; --color-accent: ${t.accentColor||'#fbbf24'}; }
    `;
    document.documentElement.style.setProperty('--color-primary',t.primaryColor||'#065f46');
    document.documentElement.style.setProperty('--color-accent',t.accentColor||'#fbbf24');
  },[data.theme]);
  // Auto-lock admin after 30 min inactive
  useEffect(()=>{if(isAdmin){Security.setupAutoLock(()=>{setIsAdmin(false);setPage('home');});}},[isAdmin]);
  // Session check every minute
  useEffect(()=>{if(!isAdmin)return;const i=setInterval(()=>{if(!Security.validateSession()){setIsAdmin(false);setPage('home');}},60000);return()=>clearInterval(i);},[isAdmin]);

  const handleLogin=(s)=>{setIsAdmin(s);if(s)setPage('admin');};
  const handleLogout=()=>{sessionStorage.removeItem('authToken');sessionStorage.removeItem('authTime');setIsAdmin(false);setPage('home');};

  const render = () => {
    if(page==='admin'&&isAdmin) return <AdminPanel data={data} setData={setData} onLogout={handleLogout}/>;
    if(page==='login') return isAdmin?<AdminPanel data={data} setData={setData} onLogout={handleLogout}/>:<LoginPage data={data} onLogin={handleLogin}/>;
    switch(page){
      case'home':return<HomePage data={data} setPage={setPage}/>;
      case'about':return<AboutPage data={data}/>;
      case'news':return<NewsPage data={data}/>;
      case'achievements':return<AchievementsPage data={data}/>;
      case'gallery':return<GalleryPage data={data}/>;
      case'articles':return<ArticlesPage data={data} setData={setData}/>;
      case'teachers':return<TeachersPage data={data}/>;
      case'videos':return<VideosPage data={data}/>;
      case'hallOfFame':return<HallOfFamePage data={data}/>;
      case'alumni':return<AlumniPage data={data} setData={setData}/>;
      case'calendar':return<CalendarPage data={data}/>;
      case'learningSupport':return<LearningSupportPage data={data}/>;
      case'jobs':return<JobsPage data={data} setData={setData}/>;
      case'contact':return<ContactPage data={data}/>;
      case'parentPortal':return<ParentPortalPage data={data} setData={setData}/>;
      default:return<HomePage data={data} setPage={setPage}/>;
    }
  };

  const chrome = !(page==='admin'&&isAdmin);

  return (
    <ToastProvider>
      <div className="min-h-screen flex flex-col bg-gray-50 text-gray-800" dir="rtl">
        {/* Sticky Alert + Header Container */}
        {chrome && (
          <div className="sticky top-0 z-50">
            <EmergencyAlerts alerts={data.emergencyAlerts}/>
            <SystemAlert notification={data.systemNotification}/>
            <Header page={page} setPage={setPage} dark={dark} setDark={setDark} siteName={data.settings.siteName} logo={data.siteLogo}/>
          </div>
        )}
        {chrome&&<NewsTicker news={data.news}/>}
        <main className="flex-1">{render()}</main>
        {chrome&&<Footer data={data} setPage={setPage}/>}
        {chrome&&<ChatWidget data={data}/>}
        {chrome&&page==='home'&&<PopupBanner data={data} setPage={setPage}/>}
        <ScrollTop/>
      </div>
    </ToastProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
