const Security = {
  hashPassword: (p) => {
    let h = 0; const s = "iqra_2026_x9k2m" + p + "iqra_2026_x9k2m";
    for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h &= h; }
    return Math.abs(h).toString(36) + "_" + s.length.toString(36);
  },
  generateToken: () => {
    const a = new Uint8Array(32); crypto.getRandomValues(a);
    return Array.from(a, b => b.toString(16).padStart(2,'0')).join('');
  },
  sanitize: (t) => !t ? '' : String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;'),
  rateLimiter: (() => {
    const a = {};
    return {
      check: (k, max=5, ms=300000) => { const n=Date.now(); a[k]=(a[k]||[]).filter(t=>n-t<ms); if(a[k].length>=max) return false; a[k].push(n); return true; },
      reset: (k) => { delete a[k]; }
    };
  })(),
  encrypt: (d) => { try { return btoa(encodeURIComponent(JSON.stringify(d))); } catch { return null; } },
  decrypt: (e) => { try { return JSON.parse(decodeURIComponent(atob(e))); } catch { return null; } },
  // Session validation
  validateSession: () => {
    const t = sessionStorage.getItem('authToken');
    const tm = sessionStorage.getItem('authTime');
    if (!t || !tm) return false;
    if (Date.now() - parseInt(tm) > 7200000) { // 2 hours
      sessionStorage.removeItem('authToken');
      sessionStorage.removeItem('authTime');
      return false;
    }
    return true;
  },
  // Auto-logout on tab visibility change
  setupAutoLock: (cb) => {
    let hidden = false;
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) { hidden = Date.now(); }
      else if (hidden && Date.now() - hidden > 1800000) { cb(); } // 30 min
    });
  }
};

const AppCtx = createContext();

function usePersistedState(key, def) {
  const [state, setState] = useState(() => {
    try {
      const e = localStorage.getItem(key);
      if (e) { const d = Security.decrypt(e); if (d) return { ...def, ...d, settings:{...def.settings,...(d.settings||{})}, parentPortal:{...def.parentPortal,...(d.parentPortal||{}), students:(d.parentPortal?.students||def.parentPortal?.students||[]), messages:(d.parentPortal?.messages||[])} }; }
    } catch {}
    return def;
  });
  const save = useCallback((ns) => {
    setState(ns);
    try { const e = Security.encrypt(ns); if(e) localStorage.setItem(key,e); } catch {}
  }, [key]);
  return [state, save];
}

/* ═══════════════════════════════════════════════════════════════
   🔔 TOAST NOTIFICATION
   ═══════════════════════════════════════════════════════════════ */
function Toast({ message, type='success', onClose }) {
  useEffect(() => { const t=setTimeout(onClose,4000); return ()=>clearTimeout(t); }, [onClose]);
  const cfg = { success:'bg-emerald-600', error:'bg-red-600', warning:'bg-amber-600', info:'bg-sky-600' };
  return (
    <div className={`${cfg[type]} text-white px-5 py-3 rounded-2xl shadow-2xl flex items-center gap-3 text-sm font-semibold`}
         style={{animation:'slideIn .4s cubic-bezier(.16,1,.3,1)'}}>
      <CircleCheck size={16}/><span>{message}</span>
      <button onClick={onClose} className="mr-auto opacity-70 hover:opacity-100"><X size={14}/></button>
    </div>
  );
}

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const notify = useCallback((msg, type='success') => {
    setToasts(p => [...p, {id:Date.now()+Math.random(),message:msg,type}]);
  }, []);
  return (
    <AppCtx.Provider value={{ notify }}>
      {children}
      <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[9999] flex flex-col gap-2 items-center max-w-md w-full px-4">
        {toasts.map(t => <Toast key={t.id} {...t} onClose={() => setToasts(p=>p.filter(x=>x.id!==t.id))} />)}
      </div>
    </AppCtx.Provider>
  );
}

function EmergencyAlerts({ alerts }) {
  const [dismissed, setDismissed] = useState({});

  if (!active.length) return null;
  
  const styles = {
    urgent:   { bg:'bg-gradient-to-l from-red-700 via-red-600 to-red-700', icon:<AlertTriangle size={15}/>, border:'border-red-500/30', pulse:true, badge:'🔴 عاجل' },

  };

  return (
    <div className="relative z-[60]">

        const s = styles[alert.type] || styles.info;
        return (
          <div key={alert.id} className={`${s.bg} text-white border-b ${s.border} relative overflow-hidden`} style={{animation:`slideIn .5s ${idx*0.1}s both`}}>
            {s.pulse && <div className="absolute inset-0 opacity-10" style={{backgroundImage:"url(\"data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='1'%3E%3Ccircle cx='3' cy='3' r='1'/%3E%3C/g%3E%3C/svg%3E\")"}}/>}

                <X size={14}/>

        );

function SystemAlert({ notification }) {
  const [v, setV] = useState(true);
  if (!notification?.active || !v) return null;
  const c = { info:'from-emerald-700 to-emerald-600', warning:'from-amber-600 to-amber-500', danger:'from-red-700 to-red-600' };
  return (
    <div className={`bg-gradient-to-l ${c[notification.type]||c.info} text-white py-2.5 px-4 text-center font-bold text-sm relative flex items-center justify-center gap-2`}>
      <AlertTriangle size={15} className="animate-pulse"/><span>{notification.message}</span>
      <button onClick={()=>setV(false)} className="absolute left-4 text-white/60 hover:text-white"><X size={15}/></button>
    </div>
  );
}

function NewsTicker({ news }) {
  if (!news?.length) return null;
  const t = news.map(n=>`◆ ${n.title}`).join('          ');
  return (
    <div className="bg-gradient-to-l from-emerald-900 via-emerald-800 to-emerald-900 text-white py-1.5 md:py-2 overflow-hidden">
      <div className="flex items-center max-w-7xl mx-auto px-3 md:px-4">

/* ═══════════════════════════════════════════════════════════════
   🎠 PREMIUM CINEMATIC HERO SLIDER
   ═══════════════════════════════════════════════════════════════ */
function HeroSlider({ slides, setPage }) {
  const [cur, setCur] = useState(0);
  const [paused, setPaused] = useState(false);
  const [progress, setProgress] = useState(0);
  const progressRef = useRef(null);
  const DURATION = 7000;

  const startProgress = useCallback(() => {
    const start = Date.now();
    const tick = () => {
      const elapsed = Date.now() - start;
      const pct = Math.min((elapsed / DURATION) * 100, 100);
      setProgress(pct);
      if (pct < 100) { progressRef.current = requestAnimationFrame(tick); }
      else { setCur(p => (p + 1) % slides.length); }
    };
    progressRef.current = requestAnimationFrame(tick);
  }, [slides.length]);

  useEffect(() => {
    if (!paused && slides.length > 1) { setProgress(0); startProgress(); }
    return () => { if(progressRef.current) cancelAnimationFrame(progressRef.current); };
  }, [cur, paused, startProgress, slides.length]);

/* ═══ Animated Counter Hook ═══ */
function useCountUp(target, duration=2000, start=false) {
  const [count, setCount] = useState(0);
  useEffect(() => {
    if (!start || !target) return;
    let startTime = null;
    const step = (ts) => {
      if (!startTime) startTime = ts;
      const progress = Math.min((ts - startTime) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      setCount(Math.floor(eased * target));
      if (progress < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [target, start, duration]);
  return count;
}

function AnimatedStat({ icon, num, label, color, suffix='+', delay=0 }) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if(e.isIntersecting) setVisible(true); }, {threshold:0.3});
    if(ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  const count = useCountUp(parseInt(num)||0, 2000, visible);
  const isNum = !isNaN(parseInt(num));

  return (
    <div ref={ref} className="text-center group cursor-default" style={{animation:visible?`fadeUp .6s ${delay}s both`:'none'}}>
      <div className={`${color} mb-2 flex justify-center group-hover:scale-110 transition-transform duration-300`}>{icon}</div>
      <p className="text-2xl md:text-3xl font-black text-gray-900">
        {isNum ? (<><span>{count}</span><span className="text-amber-500">{suffix}</span></>) : <span>{num}</span>}
      </p>
      <p className="text-xs font-bold text-gray-400">{label}</p>
    </div>
  );
}

          <button onClick={()=>setShowCert(true)} className="bg-gradient-to-l from-emerald-600 to-emerald-700 text-white px-8 py-3 rounded-2xl font-bold text-sm hover:shadow-xl transition inline-flex items-center gap-2"><FileText size={16}/>عرض وطباعة الشهادة</button>

          {events.length===0?<div className="text-center py-12"><Calendar size={40} className="text-gray-200 mx-auto mb-3"/><p className="text-gray-400 text-sm">لا أحداث قادمة</p></div>:

              <div className="flex-1 min-w-0"><p className="font-bold text-sm text-gray-800 truncate">{ev.title}</p><p className="text-[10px] text-gray-500">{new Date(ev.date).toLocaleDateString('ar-OM',{weekday:'long',month:'long',day:'numeric'})}</p></div>

            </div>

        {/* ═══ NEWS TAB ═══ */}

          <h3 className="font-bold text-sm text-gray-800 flex items-center gap-2"><Newspaper size={16} className="text-emerald-500"/>أخبار المدرسة</h3>

        </div>)}

        {/* ═══ TEACHERS TAB ═══ */}
        {tab==='teachers'&&(<div className="space-y-3">
          <h3 className="font-bold text-sm text-gray-800 flex items-center gap-2"><Users size={16} className="text-emerald-500"/>الكادر التعليمي</h3>
          <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">{(data.staff||[]).filter(s=>s.status==='published'||!s.status).map(s=>(
            <div key={s.id} className="bg-white rounded-2xl shadow-sm overflow-hidden"><div className="h-32 overflow-hidden"><img src={s.image||`https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}&size=200&background=064e3b&color=fff`} className="w-full h-full object-cover object-top" onError={e=>{e.target.src=`https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}&size=200&background=064e3b&color=fff`;}}/></div><div className="p-3"><p className="font-bold text-xs text-gray-800 truncate">{s.name}</p><p className="text-[10px] text-gray-500">{s.role}</p></div></div>

        {/* ═══ MESSAGE TAB ═══ */}

          ) : (
            <form onSubmit={sendMsg} className="space-y-3">

              <div className="bg-emerald-50 rounded-xl p-3"><p className="text-[10px] text-emerald-700 font-bold">المرسل: {student.parentName} (ولي أمر {student.name})</p></div>

              <select value={msgForm.subject} onChange={e=>setMsgForm({...msgForm,subject:e.target.value})} className="w-full p-3 border rounded-xl text-sm border-gray-200"><option value="">اختر الموضوع</option><option>استفسار عن الدرجات</option><option>طلب موعد</option><option>ملاحظة أو شكوى</option><option>اقتراح</option><option>أخرى</option></select>
              <textarea value={msgForm.message} onChange={e=>setMsgForm({...msgForm,message:e.target.value})} placeholder="نص الرسالة..." rows={4} required className="w-full p-3 border rounded-xl text-sm border-gray-200"/>
              <button type="submit" className="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold text-sm hover:bg-emerald-700 transition flex items-center justify-center gap-2"><Send size={14}/>إرسال الرسالة</button>
            </form>
          )}
        </div>)}
      </div>
    </div>
  );
}

function HomeVideos({ videos, setPage }) {
  const [activeVideo, setActiveVideo] = useState(null);
  const getYtId = (url) => { const m = url?.match(/(?:youtu\.be\/|v\/|embed\/|watch\?v=|&v=)([^#&?]*)/); return m ? m[1] : null; };
  const displayVideos = videos.slice(0, 4);
  const featured = displayVideos[0];
  const rest = displayVideos.slice(1);
  const featuredYtId = featured ? getYtId(featured.url) : null;

  return (
    <section className="py-20 bg-gradient-to-br from-gray-950 via-gray-900 to-gray-950 relative overflow-hidden">
      {/* Decorative Elements */}
      <div className="absolute inset-0 opacity-5" style={{backgroundImage:"url(\"data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23fff' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E\")"}}/>
      <div className="absolute top-0 right-0 w-96 h-96 bg-red-600/5 rounded-full blur-3xl"/>
      <div className="absolute bottom-0 left-0 w-80 h-80 bg-amber-500/5 rounded-full blur-3xl"/>

      <div className="max-w-6xl mx-auto px-4 relative z-10">
        {/* Header */}
        <div className="flex justify-between items-end mb-12">
          <div>
            <div className="flex items-center gap-2 mb-3">
              <div className="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center"><Play size={14} fill="white" className="text-white mr-[-1px]"/></div>
              <span className="text-red-400 font-black text-[10px] tracking-[0.25em] uppercase">المكتبة المرئية</span>
            </div>
            <h2 className="text-3xl font-black text-white">شاهد <span className="text-red-400">فعالياتنا</span> وأنشطتنا</h2>
            <p className="text-gray-500 text-sm mt-2">لحظات مميزة من حياتنا المدرسية</p>
          </div>
          <button onClick={()=>setPage('videos')} className="text-red-400 font-bold text-sm hover:text-red-300 flex items-center gap-1 bg-white/5 px-4 py-2 rounded-xl hover:bg-white/10 transition-all backdrop-blur-sm border border-white/10">
            عرض الكل <ChevronLeft size={14}/>
          </button>
        </div>

        {/* Inline Player */}
        {activeVideo && (() => {
          const ytId = getYtId(activeVideo.url);
          return ytId ? (
            <div className="mb-8 rounded-2xl overflow-hidden shadow-2xl shadow-black/50 border border-white/10">
              <div className="relative pb-[56.25%] bg-black">
                <iframe src={`https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0`} className="absolute inset-0 w-full h-full" frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen/>
              </div>
              <div className="bg-gray-900/80 backdrop-blur-sm p-4 flex items-center justify-between">
                <div>
                  <h4 className="font-bold text-white text-sm">{activeVideo.title}</h4>
                  {activeVideo.desc && <p className="text-gray-400 text-xs mt-0.5">{activeVideo.desc}</p>}
                </div>
                <button onClick={()=>setActiveVideo(null)} className="text-xs text-red-400 hover:text-red-300 bg-white/5 px-3 py-1.5 rounded-lg flex items-center gap-1 font-bold"><X size={12}/> إغلاق</button>
              </div>
            </div>
          ) : null;
        })()}

        {/* Cinematic Layout: Featured + Side List */}
        <div className="grid grid-cols-1 lg:grid-cols-5 gap-5">
          {/* Featured Large Video */}
          {featured && (
            <div className="lg:col-span-3 group cursor-pointer" onClick={() => setActiveVideo(featured)}>
              <div className="relative rounded-2xl overflow-hidden shadow-2xl shadow-black/40">
                {featuredYtId ? (
                  <div className="relative h-64 md:h-80 overflow-hidden">
                    <img src={`https://img.youtube.com/vi/${featuredYtId}/maxresdefault.jpg`} alt={featured.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" onError={e=>{e.target.src=`https://img.youtube.com/vi/${featuredYtId}/hqdefault.jpg`;}}/>
                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"/>
                    {/* Play Button */}
                    <div className="absolute inset-0 flex items-center justify-center">
                      <div className="w-20 h-20 bg-red-600/90 rounded-full flex items-center justify-center shadow-2xl shadow-red-600/40 group-hover:scale-110 group-hover:bg-red-600 transition-all duration-300 ring-4 ring-white/20">
                        <Play size={30} fill="white" className="text-white mr-[-3px]"/>
                      </div>
                    </div>
                    {/* Info Overlay */}
                    <div className="absolute bottom-0 right-0 left-0 p-6">
                      <div className="flex items-center gap-2 mb-2">
                        {featured.category && <span className="text-[9px] bg-red-600 text-white px-2.5 py-0.5 rounded-md font-black">{featured.category}</span>}
                        <span className="text-[9px] bg-white/20 backdrop-blur-sm text-white px-2 py-0.5 rounded-md font-bold flex items-center gap-1"><Play size={8}/> YouTube</span>
                      </div>
                      <h3 className="text-xl font-black text-white leading-snug">{featured.title}</h3>
                      {featured.desc && <p className="text-gray-300 text-sm mt-1">{featured.desc}</p>}
                    </div>
                  </div>
                ) : (
                  <div className="h-80 bg-gray-800 flex items-center justify-center"><Video size={48} className="text-gray-600"/></div>
                )}
              </div>
            </div>
          )}

          {/* Side Video Cards */}
          <div className="lg:col-span-2 flex flex-col gap-4">
            {rest.map((v, idx) => {
              const ytId = getYtId(v.url);
              return (
                <div key={v.id} className="group cursor-pointer flex gap-3 bg-white/[0.04] hover:bg-white/[0.08] rounded-xl p-2.5 transition-all border border-white/5 hover:border-white/10" onClick={() => setActiveVideo(v)}>
                  {/* Thumbnail */}
                  <div className="relative w-36 h-20 flex-shrink-0 rounded-lg overflow-hidden">
                    {ytId ? (
                      <>
                        <img src={`https://img.youtube.com/vi/${ytId}/mqdefault.jpg`} alt={v.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"/>
                        <div className="absolute inset-0 bg-black/30 group-hover:bg-black/10 transition-colors flex items-center justify-center">
                          <div className="w-9 h-9 bg-red-600/90 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform shadow-lg">
                            <Play size={14} fill="white" className="text-white mr-[-1px]"/>
                          </div>
                        </div>
                      </>
                    ) : (
                      <div className="w-full h-full bg-gray-800 flex items-center justify-center"><Video size={18} className="text-gray-600"/></div>
                    )}
                  </div>
                  {/* Info */}
                  <div className="flex-1 min-w-0 flex flex-col justify-center">
                    <h4 className="font-bold text-sm text-white group-hover:text-red-400 transition-colors line-clamp-2 leading-snug">{v.title}</h4>
                    <div className="flex items-center gap-2 mt-1.5">
                      {v.category && <span className="text-[8px] bg-white/10 text-gray-400 px-1.5 py-0.5 rounded font-bold">{v.category}</span>}
                    </div>
                  </div>
                  {/* Index */}
                  <div className="flex-shrink-0 w-7 h-7 rounded-lg bg-white/5 flex items-center justify-center text-gray-600 text-xs font-black self-center">{idx + 2}</div>
                </div>
              );
            })}

            {/* View All Button */}
            {videos.length > 4 && (
              <button onClick={()=>setPage('videos')} className="mt-auto bg-red-600/10 hover:bg-red-600/20 border border-red-500/20 text-red-400 rounded-xl py-3 text-sm font-bold flex items-center justify-center gap-2 transition-all group">
                <Video size={15}/> شاهد الكل ({videos.length} فيديو) <ChevronLeft size={14} className="group-hover:-translate-x-1 transition-transform"/>
              </button>
            )}
          </div>
        </div>
      </div>
    </section>
  );
}

/* ═══════════════════════════════════════════════════════════════
   INNER PAGES (About, News, Achievements, Gallery, etc.)

function PageBanner({ title, subtitle, icon, gradient="from-emerald-800 to-emerald-900" }) {
  return (<div className={`bg-gradient-to-br ${gradient} text-white py-16 text-center relative overflow-hidden`}>{icon&&<div className="mb-3 flex justify-center text-amber-400/80">{icon}</div>}<h1 className="text-3xl md:text-4xl font-black relative z-10">{title}</h1><p className="text-white/60 mt-2 text-sm relative z-10">{subtitle}</p></div>);
}

function StaffSection({ staff }) {
  const [filter, setFilter] = useState('all');
  const [activeCard, setActiveCard] = useState(null);
  const categories = useMemo(() => ['all', ...new Set(staff.map(s => s.category).filter(Boolean))], [staff]);
  const filtered = filter === 'all' ? staff : staff.filter(s => s.category === filter);
  const catLabels = {'إدارة':'🏫 الطاقم الإداري','أكاديمي':'📚 الطاقم الأكاديمي','فني':'🔧 الطاقم الفني'};

  return (
    <div className="mb-16">
      {/* Header */}
      <div className="text-center mb-10">
        <div className="inline-flex items-center gap-2 bg-sky-50 px-4 py-2 rounded-xl mb-4">
          <Users size={18} className="text-sky-600"/>
          <span className="text-sky-700 font-black text-xs tracking-wider">فريقنا المتميز</span>
        </div>
        <h2 className="text-3xl font-black text-gray-900">الطاقم <span className="text-emerald-600">الإداري</span> و<span className="text-sky-600">التدريسي</span></h2>
        <p className="text-gray-500 text-sm mt-2 max-w-lg mx-auto">كوادر تعليمية وإدارية مؤهلة تعمل بروح الفريق الواحد لتحقيق أفضل النتائج</p>
      </div>

      {/* Category Filter */}
      {categories.length > 2 && (
        <div className="flex flex-wrap justify-center gap-2 mb-10">
          {categories.map(c => (
            <button key={c} onClick={() => setFilter(c)} className={`px-5 py-2.5 rounded-xl text-xs font-bold transition-all ${filter === c ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/25' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
              {c === 'all' ? '👥 الجميع' : (catLabels[c] || c)}
            </button>
          ))}
        </div>
      )}

      {/* Staff Grid */}
      <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5">
        {filtered.map((member, idx) => (
          <div key={member.id}
            className="group relative cursor-pointer"
            onMouseEnter={() => setActiveCard(member.id)}
            onMouseLeave={() => setActiveCard(null)}
            onClick={() => setActiveCard(activeCard === member.id ? null : member.id)}
          >
            {/* Card */}
            <div className={`relative bg-white rounded-3xl overflow-hidden shadow-lg transition-all duration-500 ${activeCard === member.id ? 'shadow-2xl -translate-y-2 ring-2 ring-emerald-500/30' : 'hover:shadow-xl hover:-translate-y-1'}`}>
              {/* Image Container */}
              <div className="relative h-56 overflow-hidden">
                <img src={member.image} alt={member.name}
                  className="w-full h-full object-cover object-top group-hover:scale-110 transition-transform duration-700"
                  loading="lazy"
                  onError={e => {e.target.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(member.name)}&size=400&background=064e3b&color=fff&font-size=0.35&bold=true`;}}
                />
                {/* Gradient Overlay */}
                <div className="absolute inset-0 bg-gradient-to-t from-gray-900/90 via-gray-900/20 to-transparent"/>

                {/* Category Badge */}
                {member.category && (
                  <div className="absolute top-3 right-3 text-[8px] font-black px-2.5 py-1 rounded-lg bg-white/20 backdrop-blur-md text-white border border-white/20">
                    {member.category === 'إدارة' ? '🏫' : member.category === 'أكاديمي' ? '📚' : '⭐'} {member.category}
                  </div>
                )}

                {/* Name & Role - Over Image */}
                <div className="absolute bottom-0 right-0 left-0 p-4">
                  <h3 className="font-black text-white text-sm leading-snug">{member.name}</h3>
                  <p className="text-emerald-300 text-[11px] font-bold mt-0.5">{member.role}</p>
                </div>
              </div>

              {/* Quote - Expandable */}
              <div className={`overflow-hidden transition-all duration-500 ${activeCard === member.id ? 'max-h-24 py-3 px-4' : 'max-h-0'}`}>
                {member.quote && (
                  <p className="text-gray-500 text-xs leading-relaxed italic flex items-start gap-1.5">
                    <span className="text-amber-500 text-lg leading-none font-bold">"</span>
                    {member.quote}
                  </p>
                )}
              </div>

              {/* Bottom Accent Line */}
              <div className={`h-1 transition-all duration-500 ${activeCard === member.id ? 'bg-gradient-to-l from-emerald-500 via-amber-500 to-sky-500' : 'bg-gray-100'}`}/>
            </div>

            {/* Decorative Ring on Active */}
            {activeCard === member.id && (
              <div className="absolute -inset-1 rounded-[1.5rem] border-2 border-emerald-500/20 pointer-events-none" style={{animation:'fadeUp 0.3s ease'}}/>
            )}
          </div>
        ))}
      </div>

      {/* Bottom Stats */}
      <div className="mt-10 flex justify-center gap-6">
        {Object.entries(staff.reduce((acc, s) => { acc[s.category || 'أخرى'] = (acc[s.category || 'أخرى'] || 0) + 1; return acc; }, {})).map(([cat, count]) => (
          <div key={cat} className="text-center px-6 py-3 bg-gray-50 rounded-2xl">
            <p className="text-lg font-black text-gray-800">{count}</p>
            <p className="text-[10px] text-gray-500 font-bold">{catLabels[cat] || cat}</p>
          </div>
        ))}
        <div className="text-center px-6 py-3 bg-emerald-50 rounded-2xl">
          <p className="text-lg font-black text-emerald-700">{staff.length}</p>
          <p className="text-[10px] text-emerald-600 font-bold">إجمالي الطاقم</p>
        </div>
      </div>
    </div>
  );
}

function CalendarPage({ data }) {
  const events = (data.calendarEvents || []).sort((a,b) => new Date(a.date) - new Date(b.date));
  const today = new Date();
  const upcoming = events.filter(e => new Date(e.date) >= today);
  const next = upcoming[0];
  const typeLabels = {academic:'📖 أكاديمي',exam:'📝 اختبارات',holiday:'🌴 إجازة',event:'🎉 فعالية'};
  const colorMap = {emerald:'from-emerald-500 to-emerald-700',red:'from-red-500 to-red-700',amber:'from-amber-500 to-amber-700',sky:'from-sky-500 to-sky-700'};

  const getDaysLeft = (d) => { const diff = Math.ceil((new Date(d) - today) / 86400000); return diff; };
  const formatDate = (d) => { const dt = new Date(d); return dt.toLocaleDateString('ar-OM',{weekday:'long',year:'numeric',month:'long',day:'numeric'}); };
  const months = [...new Set(events.map(e => new Date(e.date).toLocaleDateString('ar-OM',{year:'numeric',month:'long'})))];

  return (<div>
    <PageBanner title="التقويم الدراسي" subtitle="المواعيد والأحداث المهمة" icon={<Calendar size={36}/>} gradient="from-sky-800 to-sky-900"/>
    <div className="max-w-5xl mx-auto px-4 py-14">

      {/* Countdown to Next Event */}
      {next && (()=>{
        const days = getDaysLeft(next.date);
        return (
          <div className={`mb-12 p-8 rounded-3xl bg-gradient-to-br ${colorMap[next.color]||colorMap.emerald} text-white text-center relative overflow-hidden shadow-2xl`}>
            <div className="absolute inset-0 opacity-10" style={{backgroundImage:"url(\"data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff'%3E%3Ccircle cx='20' cy='20' r='2'/%3E%3C/g%3E%3C/svg%3E\")"}}/>
            <div className="relative z-10">
              <p className="text-white/70 text-xs font-bold mb-2">⏳ أقرب حدث قادم</p>
              <h3 className="text-2xl font-black mb-3">{next.title}</h3>
              <div className="flex justify-center gap-4 mb-3">
                <div className="bg-white/20 backdrop-blur-sm px-6 py-3 rounded-2xl"><p className="text-3xl font-black">{days > 0 ? days : 0}</p><p className="text-[10px] text-white/80">يوم</p></div>
              </div>
              <p className="text-white/80 text-sm">{formatDate(next.date)}</p>
              {days === 0 && <span className="inline-block mt-2 bg-white/30 px-3 py-1 rounded-lg text-xs font-black animate-pulse">🎉 اليوم!</span>}
              {days < 0 && <span className="inline-block mt-2 bg-white/20 px-3 py-1 rounded-lg text-xs">انتهى</span>}
            </div>
          </div>
        );
      })()}

      {/* Timeline */}
      {events.length === 0 ? (
        <div className="text-center py-20 text-gray-400"><Calendar size={48} className="mx-auto mb-3 opacity-30"/><p>لا توجد أحداث</p></div>
      ) : (
        <div className="relative">
          {/* Vertical Line */}
          <div className="absolute right-6 md:right-1/2 top-0 bottom-0 w-0.5 bg-gray-200"/>
          {events.map((ev, idx) => {
            const days = getDaysLeft(ev.date);
            const isPast = days < 0;
            const isToday = days === 0;
            return (
              <div key={ev.id} className={`relative flex items-center gap-6 mb-6 ${idx%2===0?'md:flex-row-reverse':''}`} style={{animation:`fadeUp .5s ${idx*0.1}s both`}}>
                {/* Dot */}
                <div className="absolute right-[18px] md:right-1/2 md:-translate-x-1/2 z-10">
                  <div className={`w-4 h-4 rounded-full border-4 border-white shadow ${isPast?'bg-gray-300':isToday?'bg-amber-500 animate-pulse':'bg-emerald-500'}`}/>
                </div>
                {/* Card */}
                <div className={`mr-14 md:mr-0 md:w-[45%] ${idx%2===0?'md:mr-auto md:ml-8':'md:ml-auto md:mr-8'}`}>
                  <div className={`p-5 rounded-2xl shadow-lg border transition-all hover:shadow-xl hover:-translate-y-0.5 ${isPast?'bg-gray-50 border-gray-100 opacity-60':'bg-white border-gray-100'}`}>
                    <div className="flex items-center gap-2 mb-2 flex-wrap">
                      <span className={`text-[9px] px-2 py-0.5 rounded-lg font-black text-white bg-gradient-to-l ${colorMap[ev.color]||colorMap.emerald}`}>{typeLabels[ev.type]||ev.type}</span>
                      {isToday && <span className="text-[9px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded-lg font-black animate-pulse">اليوم!</span>}
                      {!isPast && days>0 && days<=7 && <span className="text-[9px] bg-red-100 text-red-600 px-2 py-0.5 rounded-lg font-black">باقي {days} يوم</span>}
                    </div>
                    <h4 className="font-black text-gray-800 text-sm">{ev.title}</h4>
                    <p className="text-xs text-gray-500 mt-1 flex items-center gap-1"><Calendar size={11}/> {formatDate(ev.date)}</p>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  </div>);
}

/* ═══════════════════════════════════════════════════════════════
   📣 POPUP BANNER
   ═══════════════════════════════════════════════════════════════ */
function PopupBanner({ data, setPage }) {
  const banner = data.popupBanner;
  const [show, setShow] = useState(false);
  const safeKey = (s) => 'popup_' + btoa(encodeURIComponent(String(s||'')).slice(0,30)).slice(0,20);

  useEffect(()=>{
    if(!banner||!banner.active) return;
    try { if(sessionStorage.getItem(safeKey(banner.title))) return; } catch(e){}
    const t = setTimeout(()=>setShow(true), 1500);
    return ()=>clearTimeout(t);
  },[banner?.active, banner?.title]);

  if(!show||!banner||!banner.active) return null;
  const dismiss=()=>{setShow(false);try{sessionStorage.setItem(safeKey(banner.title),'1');}catch(e){}};

  const handleClick = () => {
    dismiss();
    if(banner.linkType==='news' && banner.linkValue) {
      setPage('news');
    } else if(banner.linkType==='page') {
      setPage(banner.linkValue||'news');
    } else if(banner.linkType==='url' && banner.linkValue) {
      window.open(banner.linkValue,'_blank');
    } else {
      setPage('news');
    }
  };

  return (
    <div className="fixed inset-0 z-[3000] bg-black/70 backdrop-blur-sm flex items-center justify-center p-4" onClick={dismiss} style={{animation:'fadeUp .4s ease'}}>
      <div className="relative w-full max-w-lg bg-white rounded-3xl overflow-hidden shadow-2xl" onClick={e=>e.stopPropagation()} style={{animation:'fadeUp .5s ease'}}>
        <button onClick={dismiss} className="absolute top-3 left-3 z-10 w-9 h-9 bg-black/30 backdrop-blur-sm text-white rounded-xl flex items-center justify-center hover:bg-black/50 transition"><X size={18}/></button>
        {banner.image && <img src={banner.image} alt="" className="w-full h-52 object-cover"/>}
        <div className="p-6 text-center">
          <h3 className="text-xl font-black text-gray-900 mb-2">{banner.title}</h3>
          {banner.subtitle && <p className="text-sm text-gray-500 mb-5">{banner.subtitle}</p>}
          <button onClick={handleClick} className="bg-gradient-to-l from-emerald-600 to-emerald-700 text-white px-8 py-3 rounded-2xl font-bold text-sm hover:shadow-xl transition-all inline-flex items-center gap-2">
            <Rocket size={16}/>{banner.buttonText||'اعرف المزيد'}
          </button>
        </div>
      </div>
    </div>
  );
}

  return (<div>

    <div className="max-w-6xl mx-auto px-4 py-14">

      ) : (<>
        {/* Category Filter */}
        {categories.length > 2 && (
          <div className="flex flex-wrap justify-center gap-2 mb-8">
            {categories.map(c => (<button key={c} onClick={() => setFilter(c)} className={`px-5 py-2 rounded-xl text-sm font-bold transition-all ${filter === c ? 'bg-red-600 text-white shadow-lg shadow-red-600/30' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>{c === 'all' ? '🎬 الكل' : c}</button>))}
          </div>
        )}

        {/* Featured / Playing Video */}
        {playing !== null && (() => {
          const vid = videos.find(v => v.id === playing);
          const ytId = vid ? getYouTubeId(vid.url) : null;
          return vid ? (
            <div className="mb-10">
              <div className="relative rounded-3xl overflow-hidden shadow-2xl bg-black">
                {ytId ? (
                  <div className="relative pb-[56.25%]">
                    <iframe src={`https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0`} className="absolute inset-0 w-full h-full" frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen/>
                  </div>

                )}
              </div>
              <div className="mt-4 flex items-center justify-between flex-wrap gap-3">
                <div>
                  <h3 className="text-xl font-black text-gray-800">{vid.title}</h3>
                  {vid.desc && <p className="text-sm text-gray-500 mt-1">{vid.desc}</p>}
                  {vid.category && <span className="inline-block mt-2 text-[10px] bg-red-50 text-red-600 px-2.5 py-0.5 rounded-lg font-bold">{vid.category}</span>}
                </div>
                <button onClick={() => setPlaying(null)} className="text-sm font-bold text-red-600 hover:text-red-700 flex items-center gap-1 bg-red-50 px-4 py-2 rounded-xl hover:bg-red-100 transition"><X size={14}/> إغلاق المشغل</button>
              </div>
            </div>
          ) : null;
        })()}

        {/* Video Grid */}
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          {filtered.map(v => {
            const ytId = getYouTubeId(v.url);
            const isPlaying = playing === v.id;
            return (
              <div key={v.id} className={`rounded-3xl overflow-hidden shadow-lg hover:shadow-2xl transition-all hover:-translate-y-1 bg-white group cursor-pointer ${isPlaying ? 'ring-2 ring-red-500 ring-offset-2' : ''}`} onClick={() => { setPlaying(v.id); window.scrollTo({top:200,behavior:'smooth'}); }}>
                <div className="relative">
                  {ytId ? (
                    <div className="relative h-48 overflow-hidden">
                      <img src={`https://img.youtube.com/vi/${ytId}/hqdefault.jpg`} alt={v.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"/>
                      <div className="absolute inset-0 bg-black/30 group-hover:bg-black/20 transition-colors flex items-center justify-center">
                        <div className="w-16 h-16 bg-red-600/90 rounded-full flex items-center justify-center shadow-xl group-hover:scale-110 group-hover:bg-red-600 transition-all">
                          <Play size={24} fill="white" className="text-white mr-[-2px]"/>
                        </div>
                      </div>
                      {v.category && <div className="absolute top-3 right-3 bg-black/60 backdrop-blur-sm text-white text-[9px] px-2.5 py-1 rounded-lg font-bold">{v.category}</div>}
                      <div className="absolute bottom-2 left-2 bg-red-600 text-white text-[9px] px-2 py-0.5 rounded-md font-bold flex items-center gap-1"><Play size={8}/> YouTube</div>
                    </div>
                  ) : (
                    <div className="h-48 bg-gray-200 flex items-center justify-center"><Video size={36} className="text-gray-400"/></div>
                  )}
                </div>
                <div className="p-4">
                  <h3 className="font-bold text-sm text-gray-800 group-hover:text-red-700 transition-colors">{v.title}</h3>
                  {v.desc && <p className="text-xs text-gray-500 mt-1 line-clamp-2">{v.desc}</p>}
                  {isPlaying && <span className="text-[10px] text-red-600 font-bold mt-2 flex items-center gap-1"><span className="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"/> قيد التشغيل</span>}
                </div>
              </div>
            );
          })}
        </div>
      </>)}
    </div>
  </div>);
}

  const [captchaVerified, setCaptchaVerified] = useState(false);
  const activeJobs = (data.jobs||[]).filter(j=>j.active);

    const ops = ['+','-','×'];
    const op = ops[Math.floor(Math.random()*3)];
    let a,b,correct;
    if(op==='+'){a=Math.floor(Math.random()*20)+1;b=Math.floor(Math.random()*20)+1;correct=a+b;}
    else if(op==='-'){a=Math.floor(Math.random()*20)+10;b=Math.floor(Math.random()*a);correct=a-b;}
    else{a=Math.floor(Math.random()*9)+2;b=Math.floor(Math.random()*9)+2;correct=a*b;}
    setCaptcha({a,b,op,answer:'',correct});setCaptchaVerified(false);
  },[]);

      <div className="border-2 border-amber-200 rounded-2xl p-5 bg-amber-50/50"><h4 className="font-bold text-sm mb-3 flex items-center gap-2 text-amber-700"><Shield size={16}/> التحقق الأمني</h4>
        <p className="text-xs text-gray-500 mb-3">للتأكد من أنك لست روبوت، أجب عن السؤال التالي:</p>
        <div className="flex items-center gap-3 flex-wrap">
          <div className="bg-white border-2 border-amber-300 rounded-xl px-5 py-3 font-black text-lg text-gray-800 tracking-wider select-none shadow-inner" dir="ltr">{captcha.a} {captcha.op} {captcha.b} = ?</div>
          <input value={captcha.answer} onChange={e=>setCaptcha({...captcha,answer:e.target.value})} placeholder="الإجابة" className="w-24 p-3 rounded-xl border-2 border-amber-300 text-sm text-center font-bold bg-white" dir="ltr" disabled={captchaVerified}/>
          {!captchaVerified ? (
            <button type="button" onClick={verifyCaptcha} className="bg-amber-600 text-white px-5 py-3 rounded-xl text-xs font-bold hover:bg-amber-700 transition flex items-center gap-2 shadow-lg"><Shield size={14}/> تحقق</button>
          ) : (
            <span className="flex items-center gap-2 text-emerald-600 font-bold text-sm bg-emerald-50 px-4 py-2.5 rounded-xl"><CheckCircle2 size={16}/> تم التحقق ✓</span>
          )}
          <button type="button" onClick={genCaptcha} className="text-gray-400 hover:text-amber-600 text-xs font-bold flex items-center gap-1" title="سؤال جديد"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg> سؤال جديد</button>
        </div>
      </div>

      <div className="flex gap-3 pt-2"><button type="submit" disabled={!captchaVerified} className={`flex-1 py-3.5 rounded-2xl font-bold transition flex items-center justify-center gap-2 shadow-lg ${captchaVerified?'bg-sky-700 text-white hover:bg-sky-800':'bg-gray-300 text-gray-500 cursor-not-allowed'}`}><Send size={16}/> إرسال الطلب</button><button type="button" onClick={()=>setApplying(false)} className="px-6 py-3.5 rounded-2xl font-bold text-sm border-2 border-gray-200 text-gray-500">إلغاء</button></div>
    </form></div></div></div>);

  return (<div><PageBanner title="التوظيف" subtitle="انضم إلى فريقنا التعليمي" icon={<Briefcase size={36}/>} gradient="from-sky-800 to-sky-900"/>
    <div className="max-w-6xl mx-auto px-4 py-14"><div className="p-6 rounded-3xl mb-10 flex items-start gap-4 bg-sky-50 border border-sky-100"><div className="w-12 h-12 rounded-2xl bg-sky-100 text-sky-700 flex items-center justify-center flex-shrink-0"><Handshake size={24}/></div><div><h3 className="font-bold mb-1 text-gray-800">نرحب بالكوادر المتميزة</h3><p className="text-sm text-gray-600">استعرض الوظائف الشاغرة وقدّم طلبك إلكترونياً.</p></div></div>
    {activeJobs.length===0?<div className="text-center py-16"><Briefcase size={48} className="mx-auto mb-4 text-gray-300"/><h3 className="text-xl font-bold mb-2 text-gray-500">لا توجد وظائف شاغرة حالياً</h3></div>:
    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">{activeJobs.map(job=>(<div key={job.id} className="rounded-3xl shadow-lg overflow-hidden border-t-4 border-sky-600 hover:shadow-2xl transition-all hover:-translate-y-1 bg-white flex flex-col"><div className="p-6 flex-1"><div className="flex items-center gap-2 mb-3"><span className="text-[10px] px-2 py-0.5 rounded-lg font-bold bg-sky-50 text-sky-700">{job.type}</span><span className="text-[10px] px-2 py-0.5 rounded-lg font-bold bg-gray-100 text-gray-500">{job.department}</span></div><h3 className="text-lg font-black mb-2 text-gray-900">{job.title}</h3><p className="text-sm leading-relaxed mb-4 text-gray-600">{job.description}</p><div className="text-xs space-y-1.5 text-gray-500"><p className="flex items-center gap-2"><BadgeCheck size={13} className="text-emerald-500 flex-shrink-0"/><span className="font-bold">المتطلبات:</span> {job.requirements}</p><p className="flex items-center gap-2"><Calendar size={13} className="text-amber-500 flex-shrink-0"/><span className="font-bold">آخر موعد:</span> {job.deadline}</p></div></div><div className="p-4 border-t border-gray-100"><button onClick={()=>{setSelected(job);setApplying(true);}} className="w-full bg-sky-700 text-white py-3 rounded-2xl font-bold hover:bg-sky-800 transition flex items-center justify-center gap-2 shadow-lg"><FileUp size={15}/> تقديم الآن</button></div></div>))}</div>}</div>
  </div>);
}

/* ═══════════════════════════════════════════════════════════════
   🔐 LOGIN PAGE
   ═══════════════════════════════════════════════════════════════ */
function LoginPage({ data, onLogin }) {
  const { notify } = useContext(AppCtx);
  const [u,setU]=useState('');const [p,setP]=useState('');const [show,setShow]=useState(false);const [loading,setLoading]=useState(false);
  const login=async(e)=>{e.preventDefault();if(!Security.rateLimiter.check('login')){notify('تم تجاوز المحاولات. حاول بعد 5 دقائق.','error');return;}setLoading(true);await new Promise(r=>setTimeout(r,800));if(u===data.credentials.username&&Security.hashPassword(p)===data.credentials.passwordHash){sessionStorage.setItem('authToken',Security.generateToken());sessionStorage.setItem('authTime',Date.now().toString());Security.rateLimiter.reset('login');notify('تم تسجيل الدخول','success');onLogin(true);}else{notify('بيانات غير صحيحة','error');}setLoading(false);};
  return (<div className="min-h-[60vh] flex items-center justify-center p-4 bg-gray-100"><div className="p-8 rounded-3xl shadow-2xl max-w-md w-full border-t-4 border-emerald-600 bg-white"><div className="text-center mb-6"><div className="w-16 h-16 bg-emerald-100 rounded-2xl flex items-center justify-center mx-auto mb-3"><ShieldCheck size={32} className="text-emerald-600"/></div><h2 className="text-2xl font-black text-gray-800">لوحة التحكم</h2><p className="text-sm text-gray-500">للمسؤولين فقط</p></div><form onSubmit={login} className="space-y-4"><div><label className="block text-sm font-bold mb-1 text-gray-700">اسم المستخدم</label><input value={u} onChange={e=>setU(e.target.value)} required className="w-full p-3 rounded-xl border text-sm border-gray-200"/></div><div><label className="block text-sm font-bold mb-1 text-gray-700">كلمة المرور</label><div className="relative"><input type={show?'text':'password'} value={p} onChange={e=>setP(e.target.value)} required className="w-full p-3 rounded-xl border text-sm pl-10 border-gray-200"/><button type="button" onClick={()=>setShow(!show)} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">{show?<EyeOff size={16}/>:<Eye size={16}/>}</button></div></div><button type="submit" disabled={loading} className="w-full bg-emerald-700 text-white py-3 rounded-xl font-bold hover:bg-emerald-800 transition flex items-center justify-center gap-2 disabled:opacity-50">{loading?<Loader2 size={16} className="animate-spin"/>:<Lock size={14}/>}{loading?'جاري التحقق...':'دخول'}</button><p className="text-[10px] text-center text-gray-500">تم تجاوز الحد الأقصى؟ حاول بعد 5 دقائق</p></form></div></div>);
}

/* ═══════════════════════════════════════════════════════════════
   👷 ADMIN: EMPLOYEES MANAGEMENT

  const [editId,setEditId]=useState(null);const [showForm,setShowForm]=useState(false);const [search,setSearch]=useState('');const [deptFilter,setDeptFilter]=useState('all');
  const departments=['الإدارة العليا','القسم الأكاديمي','الشؤون الطلابية','الخدمات المدرسية','الموارد البشرية','تقنية المعلومات','الإرشاد النفسي'];
  const contracts=['دائم','مؤقت','سنوي','بدوام جزئي'];

  const save=()=>{
    if(!form.name.trim()||!form.position.trim()){notify('الاسم والمسمى مطلوبان','warning');return;}
    if(editId!==null){setData({...data,employees:employees.map(e=>e.id===editId?{...e,...form,salary:parseFloat(form.salary)||0}:e)});notify('تم التعديل','success');}
    else{setData({...data,employees:[...employees,{...form,id:Date.now(),salary:parseFloat(form.salary)||0}]});notify('تمت الإضافة','success');}
    reset();
  };
  const del=(id)=>{if(window.confirm('حذف هذا الموظف؟')){setData({...data,employees:employees.filter(e=>e.id!==id)});notify('تم الحذف');}};
  const filtered=employees.filter(e=>(!search||e.name.includes(search)||(e.position||'').includes(search))&&(deptFilter==='all'||e.department===deptFilter));
  const activeCount=employees.filter(e=>e.status==='active').length;
  const deptCounts=departments.reduce((a,d)=>({...a,[d]:employees.filter(e=>e.department===d).length}),{});
  const totalSalary=employees.reduce((s,e)=>s+(parseFloat(e.salary)||0),0);
  const statusColor={active:'bg-emerald-100 text-emerald-700',inactive:'bg-red-100 text-red-700',leave:'bg-amber-100 text-amber-700'};
  const statusLabel={active:'نشط',inactive:'غير نشط',leave:'إجازة'};
  return(<div>
    <h2 className="text-xl font-black text-gray-800 mb-1 flex items-center gap-2"><Building2 size={22} className="text-purple-500"/>إدارة الموظفين</h2>
    <p className="text-sm text-gray-500 mb-5">الملفات الوظيفية الكاملة لجميع الموظفين</p>
    <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5">
      <div className="bg-white p-4 rounded-2xl shadow-sm border-r-4 border-purple-500 text-center"><p className="text-2xl font-black text-gray-800">{employees.length}</p><p className="text-[10px] text-gray-500 font-bold">إجمالي</p></div>
      <div className="bg-white p-4 rounded-2xl shadow-sm border-r-4 border-emerald-500 text-center"><p className="text-2xl font-black text-emerald-600">{activeCount}</p><p className="text-[10px] text-gray-500 font-bold">نشط</p></div>
      <div className="bg-white p-4 rounded-2xl shadow-sm border-r-4 border-sky-500 text-center"><p className="text-2xl font-black text-sky-600">{departments.filter(d=>deptCounts[d]>0).length}</p><p className="text-[10px] text-gray-500 font-bold">أقسام</p></div>
      <div className="bg-white p-4 rounded-2xl shadow-sm border-r-4 border-amber-500 text-center"><p className="text-lg font-black text-amber-600">{totalSalary.toLocaleString()}</p><p className="text-[10px] text-gray-500 font-bold">إجمالي الرواتب ر.ع</p></div>
    </div>
    <div className="flex flex-wrap gap-2 mb-5">
      <button onClick={()=>{reset();setShowForm(true);}} className="bg-purple-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-purple-700 shadow-lg shadow-purple-600/20"><Plus size={14}/>إضافة موظف</button>
      <div className="flex-1 min-w-[160px] relative"><Search size={13} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"/><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="بحث..." className="w-full pr-8 pl-3 py-2.5 border rounded-xl text-sm border-gray-200"/></div>
      <select value={deptFilter} onChange={e=>setDeptFilter(e.target.value)} className="px-3 py-2.5 border rounded-xl text-sm border-gray-200"><option value="all">كل الأقسام</option>{departments.map(d=><option key={d}>{d}</option>)}</select>
    </div>
    {showForm&&(<div className="bg-white p-6 rounded-2xl shadow-sm mb-6 border-t-4 border-purple-500">
      <div className="flex items-center justify-between mb-4"><h3 className="font-bold text-sm">{editId?'تعديل بيانات موظف':'إضافة موظف جديد'}</h3><button onClick={reset} className="text-gray-400 hover:text-gray-600"><X size={16}/></button></div>
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">الاسم الكامل *</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200" placeholder="الاسم الرباعي"/></div>
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">القسم</label><select value={form.department} onChange={e=>setForm({...form,department:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200">{departments.map(d=><option key={d}>{d}</option>)}</select></div>
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">المسمى الوظيفي *</label><input value={form.position} onChange={e=>setForm({...form,position:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200"/></div>
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">الهاتف</label><input value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200" dir="ltr"/></div>
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">البريد الإلكتروني</label><input type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200" dir="ltr"/></div>
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">الراتب الأساسي (ر.ع)</label><input type="number" value={form.salary} onChange={e=>setForm({...form,salary:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200" placeholder="0.000"/></div>
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">تاريخ الالتحاق</label><input type="date" value={form.joinDate} onChange={e=>setForm({...form,joinDate:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200"/></div>
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">الجنس</label><select value={form.gender} onChange={e=>setForm({...form,gender:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200"><option>ذكر</option><option>أنثى</option></select></div>
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">الجنسية</label><input value={form.nationality} onChange={e=>setForm({...form,nationality:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200"/></div>
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">نوع العقد</label><select value={form.contractType} onChange={e=>setForm({...form,contractType:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200">{contracts.map(c=><option key={c}>{c}</option>)}</select></div>
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">الحالة</label><select value={form.status} onChange={e=>setForm({...form,status:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200"><option value="active">نشط</option><option value="inactive">غير نشط</option><option value="leave">إجازة</option></select></div>
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">رابط الصورة</label><input value={form.image} onChange={e=>setForm({...form,image:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200" dir="ltr" placeholder="https://..."/></div>
        <div className="col-span-full"><label className="block text-[10px] font-bold text-gray-500 mb-1">ملاحظات</label><input value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200" placeholder="ملاحظات اختيارية"/></div>
      </div>
      <div className="flex gap-2 mt-4"><button onClick={save} className="bg-purple-600 text-white px-6 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-purple-700"><Save size={14}/>{editId?'حفظ':'إضافة'}</button><button onClick={reset} className="bg-gray-200 text-gray-600 px-5 py-2.5 rounded-xl text-sm font-bold">إلغاء</button></div>
    </div>)}
    <div className="bg-white rounded-2xl shadow-sm overflow-hidden">
      <div className="p-4 border-b border-gray-100"><h3 className="font-bold text-sm flex items-center gap-2"><Users size={14} className="text-purple-500"/>الموظفون ({filtered.length})</h3></div>
      {filtered.length===0?(<div className="text-center py-12"><Building2 size={40} className="mx-auto mb-3 text-gray-200"/><p className="text-gray-400 text-sm">{search||deptFilter!=='all'?'لا نتائج':'لم يتم إضافة موظفين بعد'}</p></div>):(
        <div className="divide-y divide-gray-50">{filtered.map(emp=>(
          <div key={emp.id} className="flex items-center gap-4 p-4 hover:bg-gray-50 transition">
            <img src={emp.image||`https://ui-avatars.com/api/?name=${encodeURIComponent(emp.name)}&background=7c3aed&color=fff&size=80`} className="w-12 h-12 rounded-xl object-cover flex-shrink-0" onError={e=>{e.target.src=`https://ui-avatars.com/api/?name=${encodeURIComponent(emp.name)}&background=7c3aed&color=fff`;}}/>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 flex-wrap"><p className="font-bold text-sm text-gray-800">{emp.name}</p><span className={`text-[9px] px-1.5 py-0.5 rounded-md font-bold ${statusColor[emp.status]||'bg-gray-100 text-gray-600'}`}>{statusLabel[emp.status]||emp.status}</span></div>
              <p className="text-[11px] text-purple-600 font-bold">{emp.position}</p>
              <div className="flex flex-wrap gap-1.5 mt-0.5">
                <span className="text-[9px] text-gray-500 bg-gray-100 px-2 py-0.5 rounded">{emp.department}</span>
                {emp.contractType&&<span className="text-[9px] text-sky-600 bg-sky-50 px-2 py-0.5 rounded">{emp.contractType}</span>}
                {emp.salary>0&&<span className="text-[9px] text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded font-bold">{parseFloat(emp.salary).toLocaleString()} ر.ع</span>}
              </div>
            </div>
            <div className="hidden md:block text-center flex-shrink-0"><p className="text-[9px] text-gray-400">هاتف</p><p className="text-[11px] font-bold text-gray-700" dir="ltr">{emp.phone||'—'}</p></div>
            <div className="hidden lg:block text-center flex-shrink-0"><p className="text-[9px] text-gray-400">الالتحاق</p><p className="text-[11px] font-bold text-gray-700">{emp.joinDate||'—'}</p></div>
            <div className="flex gap-1 flex-shrink-0">
              <button onClick={()=>{setForm({name:emp.name,department:emp.department||'القسم الأكاديمي',position:emp.position||'',phone:emp.phone||'',email:emp.email||'',salary:emp.salary||'',joinDate:emp.joinDate||'',status:emp.status||'active',gender:emp.gender||'ذكر',nationality:emp.nationality||'عُمانية',contractType:emp.contractType||'دائم',image:emp.image||'',notes:emp.notes||''});setEditId(emp.id);setShowForm(true);window.scrollTo({top:0,behavior:'smooth'});}} className="p-2 text-sky-600 hover:bg-sky-50 rounded-lg"><Edit size={13}/></button>
              <button onClick={()=>del(emp.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg"><Trash2 size={13}/></button>
            </div>
          </div>))}</div>
      )}
    </div>
    {employees.length>0&&(<div className="mt-5 bg-white p-5 rounded-2xl shadow-sm">
      <h3 className="font-bold text-sm mb-3 text-gray-700">توزيع الموظفين بالأقسام</h3>
      <div className="space-y-2">{departments.filter(d=>deptCounts[d]>0).map(d=>(
        <div key={d} className="flex items-center gap-3"><span className="text-xs text-gray-600 w-40 flex-shrink-0">{d}</span><div className="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden"><div className="h-full bg-purple-500 rounded-full" style={{width:`${deptCounts[d]/employees.length*100}%`}}/></div><span className="text-xs font-bold text-gray-700 w-5 text-left">{deptCounts[d]}</span></div>
      ))}</div>
    </div>)}
  </div>);
}

/* ═══════════════════════════════════════════════════════════════
   🚌 ADMIN: BUS MANAGEMENT

function ABuses({data,setData,notify}){
  const buses=data.buses||[];
  const students=data.parentPortal?.students||[];
  const [form,setForm]=useState({plateNumber:'',capacity:30,driverName:'',driverPhone:'',route:'',area:'',active:true,color:'sky',students:[]});
  const [editId,setEditId]=useState(null);const [showForm,setShowForm]=useState(false);
  const colorGrad={sky:'from-sky-500 to-sky-700',emerald:'from-emerald-500 to-emerald-700',amber:'from-amber-500 to-amber-700',purple:'from-purple-500 to-purple-700',rose:'from-rose-500 to-rose-700'};
  const colorBadge={sky:'bg-sky-100 text-sky-700',emerald:'bg-emerald-100 text-emerald-700',amber:'bg-amber-100 text-amber-700',purple:'bg-purple-100 text-purple-700',rose:'bg-rose-100 text-rose-700'};
  const reset=()=>{setForm({plateNumber:'',capacity:30,driverName:'',driverPhone:'',route:'',area:'',active:true,color:'sky',students:[]});setEditId(null);setShowForm(false);};
  const save=()=>{
    if(!form.plateNumber.trim()||!form.driverName.trim()){notify('رقم اللوحة والسائق مطلوبان','warning');return;}
    if(editId!==null){setData({...data,buses:buses.map(b=>b.id===editId?{...b,...form,capacity:parseInt(form.capacity)||30}:b)});notify('تم التعديل','success');}
    else{setData({...data,buses:[...buses,{...form,id:Date.now(),capacity:parseInt(form.capacity)||30}]});notify('تمت الإضافة','success');}
    reset();
  };
  const del=(id)=>{if(window.confirm('حذف هذه الحافلة؟')){setData({...data,buses:buses.filter(b=>b.id!==id)});notify('تم الحذف');}};
  const toggleStudent=(busId,studentId)=>{setData({...data,buses:buses.map(b=>{if(b.id!==busId)return b;const s=b.students||[];return{...b,students:s.includes(studentId)?s.filter(x=>x!==studentId):[...s,studentId]};})});};
  const totalStudents=buses.reduce((s,b)=>s+(b.students||[]).length,0);
  return(<div>
    <h2 className="text-xl font-black text-gray-800 mb-1 flex items-center gap-2"><Bus size={22} className="text-sky-500"/>إدارة الحافلات المدرسية</h2>

      <div className="bg-white p-4 rounded-2xl shadow-sm border-r-4 border-emerald-500 text-center"><p className="text-2xl font-black text-emerald-600">{buses.filter(b=>b.active).length}</p><p className="text-[10px] text-gray-500 font-bold">نشطة</p></div>
      <div className="bg-white p-4 rounded-2xl shadow-sm border-r-4 border-amber-500 text-center"><p className="text-2xl font-black text-amber-600">{totalStudents}</p><p className="text-[10px] text-gray-500 font-bold">طالب مسجل</p></div>
      <div className="bg-white p-4 rounded-2xl shadow-sm border-r-4 border-purple-500 text-center"><p className="text-2xl font-black text-purple-600">{buses.reduce((s,b)=>s+parseInt(b.capacity||0),0)}</p><p className="text-[10px] text-gray-500 font-bold">إجمالي الطاقة</p></div>
    </div>
    <button onClick={()=>{reset();setShowForm(true);}} className="bg-sky-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-sky-700 shadow-lg shadow-sky-600/20 mb-5"><Plus size={14}/>إضافة حافلة</button>
    {showForm&&(<div className="bg-white p-6 rounded-2xl shadow-sm mb-6 border-t-4 border-sky-500">
      <div className="flex items-center justify-between mb-4"><h3 className="font-bold text-sm">{editId?'تعديل الحافلة':'إضافة حافلة جديدة'}</h3><button onClick={reset} className="text-gray-400 hover:text-gray-600"><X size={16}/></button></div>
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">رقم اللوحة *</label><input value={form.plateNumber} onChange={e=>setForm({...form,plateNumber:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200" placeholder="ع م ١٢٣٤"/></div>
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">الطاقة الاستيعابية</label><input type="number" value={form.capacity} onChange={e=>setForm({...form,capacity:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200"/></div>
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">اسم السائق *</label><input value={form.driverName} onChange={e=>setForm({...form,driverName:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200"/></div>
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">هاتف السائق</label><input value={form.driverPhone} onChange={e=>setForm({...form,driverPhone:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200" dir="ltr"/></div>
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">مسار الخط</label><input value={form.route} onChange={e=>setForm({...form,route:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200" placeholder="منطقة..."/></div>
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">المنطقة</label><input value={form.area} onChange={e=>setForm({...form,area:e.target.value})} className="w-full p-2.5 border rounded-xl text-sm border-gray-200"/></div>
        <div><label className="block text-[10px] font-bold text-gray-500 mb-2">اللون</label><div className="flex gap-2">{Object.keys(colorGrad).map(c=><button key={c} onClick={()=>setForm({...form,color:c})} className={`w-8 h-8 rounded-xl bg-gradient-to-br ${colorGrad[c]} border-2 transition-all ${form.color===c?'border-gray-800 scale-110':'border-transparent'}`}/>)}</div></div>
        <div className="flex items-end"><label className="flex items-center gap-2 cursor-pointer"><input type="checkbox" checked={form.active} onChange={e=>setForm({...form,active:e.target.checked})} className="w-4 h-4"/><span className="text-sm font-bold text-gray-700">نشطة</span></label></div>
      </div>
      <div className="flex gap-2 mt-4"><button onClick={save} className="bg-sky-600 text-white px-6 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-sky-700"><Save size={14}/>{editId?'حفظ':'إضافة'}</button><button onClick={reset} className="bg-gray-200 text-gray-600 px-5 py-2.5 rounded-xl text-sm font-bold">إلغاء</button></div>
    </div>)}
    {buses.length===0?(<div className="bg-white rounded-2xl shadow-sm p-12 text-center"><Bus size={48} className="mx-auto mb-3 text-gray-200"/><p className="text-gray-400 text-sm">لم يتم إضافة حافلات بعد</p></div>):(
      <div className="grid grid-cols-1 md:grid-cols-2 gap-5">{buses.map(bus=>{
        const assignedStudents=(bus.students||[]).map(sId=>students.find(s=>s.id===sId)).filter(Boolean);
        const occupancy=bus.capacity>0?Math.round((bus.students||[]).length/bus.capacity*100):0;
        return(<div key={bus.id} className="bg-white rounded-2xl shadow-sm overflow-hidden hover:shadow-md transition">
          <div className={`bg-gradient-to-l ${colorGrad[bus.color]||colorGrad.sky} p-4 text-white`}>
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center gap-3"><div className="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center"><Bus size={24}/></div><div><p className="font-black text-lg">{bus.plateNumber}</p><p className="text-white/80 text-[11px]">{bus.route||'بدون مسار'}</p></div></div>
              <span className={`text-[9px] px-2 py-0.5 rounded-lg font-bold ${bus.active?'bg-white/25':'bg-black/25'}`}>{bus.active?'نشطة':'متوقفة'}</span>
            </div>
            <div><div className="flex justify-between text-[9px] text-white/70 mb-1"><span>الطاقة: {(bus.students||[]).length}/{bus.capacity}</span><span>{occupancy}%</span></div><div className="h-1.5 bg-white/20 rounded-full overflow-hidden"><div className={`h-full rounded-full ${occupancy>90?'bg-red-400':occupancy>70?'bg-amber-400':'bg-white'}`} style={{width:`${occupancy}%`}}/></div></div>
          </div>
          <div className="p-4 border-b border-gray-100"><div className="flex items-center gap-3"><div className="w-10 h-10 bg-gray-100 rounded-xl flex items-center justify-center"><User size={18} className="text-gray-500"/></div><div><p className="font-bold text-sm text-gray-800">{bus.driverName||'—'}</p><p className="text-[10px] text-gray-400" dir="ltr">{bus.driverPhone||'—'}</p></div></div></div>
          {students.length>0&&(<div className="p-4">
            <p className="text-[10px] font-bold text-gray-500 mb-2">طلاب مسجلون ({assignedStudents.length})</p>
            <div className="flex flex-wrap gap-1 mb-2">{assignedStudents.map(s=>(<span key={s.id} className={`text-[10px] ${colorBadge[bus.color]||colorBadge.sky} px-2 py-0.5 rounded-lg font-bold flex items-center gap-1`}>{s.name}<button onClick={()=>toggleStudent(bus.id,s.id)} className="opacity-50 hover:opacity-100"><X size={8}/></button></span>))}</div>
            <select onChange={e=>{if(e.target.value&&!(bus.students||[]).includes(parseInt(e.target.value))){toggleStudent(bus.id,parseInt(e.target.value));}e.target.value='';}} className="w-full p-2 border rounded-xl text-xs border-gray-200 text-gray-600">
              <option value="">+ إضافة طالب...</option>{students.filter(s=>!(bus.students||[]).includes(s.id)).map(s=><option key={s.id} value={s.id}>{s.name} - {s.grade}</option>)}
            </select>
          </div>)}
          <div className="px-4 pb-4 flex gap-2">
            <button onClick={()=>{setForm({plateNumber:bus.plateNumber,capacity:bus.capacity||30,driverName:bus.driverName||'',driverPhone:bus.driverPhone||'',route:bus.route||'',area:bus.area||'',active:bus.active!==false,color:bus.color||'sky',students:bus.students||[]});setEditId(bus.id);setShowForm(true);window.scrollTo({top:0,behavior:'smooth'});}} className="flex-1 py-2 bg-sky-50 text-sky-600 rounded-xl text-xs font-bold hover:bg-sky-100 flex items-center justify-center gap-1"><Edit size={12}/>تعديل</button>
            <button onClick={()=>del(bus.id)} className="py-2 px-3 bg-red-50 text-red-500 rounded-xl text-xs font-bold hover:bg-red-100"><Trash2 size={12}/></button>
          </div>
        </div>);})}</div>
    )}
  </div>);
}

/* ═══════════════════════════════════════════════════════════════
   ✅ ADMIN: ATTENDANCE TRACKING
   ═══════════════════════════════════════════════════════════════ */
function AAttendance({data,setData,notify}){
  const today=new Date().toISOString().split('T')[0];
  const [date,setDate]=useState(today);const [mode,setMode]=useState('students');
  const students=data.parentPortal?.students||[];const employees=data.employees||[];
  const getAtt=(type)=>{const att=type==='students'?(data.attendanceStudents||{}):(data.attendanceEmployees||{});return att[date]||{};};
  const setAtt=(type,personId,status)=>{const k=type==='students'?'attendanceStudents':'attendanceEmployees';const att=data[k]||{};const day=att[date]||{};const nd={...day};if(status===null){delete nd[personId];}else{nd[personId]=status;}setData({...data,[k]:{...att,[date]:nd}});};
  const setAll=(type,status)=>{const k=type==='students'?'attendanceStudents':'attendanceEmployees';const att=data[k]||{};const people=type==='students'?students:employees;const day={};people.forEach(p=>{day[p.id]=status;});setData({...data,[k]:{...att,[date]:day}});notify(`تم تسجيل ${status==='present'?'الحضور':'الغياب'} للجميع`,'success');};
  const dayAtt=getAtt(mode);const people=mode==='students'?students:employees;
  const pCount=people.filter(p=>dayAtt[p.id]==='present').length;const aCount=people.filter(p=>dayAtt[p.id]==='absent').length;const lCount=people.filter(p=>dayAtt[p.id]==='late').length;const unRec=people.filter(p=>!dayAtt[p.id]).length;
  const stCfg={present:{l:'حاضر',b:'bg-emerald-100',t:'text-emerald-700',br:'border-r-2 border-emerald-400',btn:'bg-emerald-500 text-white'},absent:{l:'غائب',b:'bg-red-100',t:'text-red-700',br:'border-r-2 border-red-400',btn:'bg-red-500 text-white'},late:{l:'متأخر',b:'bg-amber-100',t:'text-amber-700',br:'border-r-2 border-amber-400',btn:'bg-amber-500 text-white'},excuse:{l:'عذر',b:'bg-sky-100',t:'text-sky-700',br:'border-r-2 border-sky-400',btn:'bg-sky-500 text-white'}};
  const attKey=mode==='students'?'attendanceStudents':'attendanceEmployees';const allDates=Object.keys(data[attKey]||{}).sort().reverse().slice(0,30);
  return(<div>
    <h2 className="text-xl font-black text-gray-800 mb-1 flex items-center gap-2"><UserCheck size={22} className="text-emerald-500"/>الحضور والغياب</h2>
    <p className="text-sm text-gray-500 mb-5">تسجيل ومتابعة حضور الطلاب والموظفين يومياً</p>
    <div className="flex gap-2 mb-5">
      {[{k:'students',l:'الطلاب',n:students.length},{k:'employees',l:'الموظفون',n:employees.length}].map(m=>(
        <button key={m.k} onClick={()=>setMode(m.k)} className={`px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 transition ${mode===m.k?'bg-emerald-600 text-white shadow-lg shadow-emerald-600/20':'bg-white text-gray-600 hover:bg-gray-50'}`}>
          {m.l}<span className={`text-[10px] px-1.5 py-0.5 rounded-md font-black ${mode===m.k?'bg-white/20':'bg-gray-100'}`}>{m.n}</span>
        </button>
      ))}
    </div>
    <div className="bg-white rounded-2xl shadow-sm p-5 mb-5">
      <div className="flex flex-wrap items-center gap-4 mb-4">
        <div><label className="block text-[10px] font-bold text-gray-500 mb-1">التاريخ</label><input type="date" value={date} onChange={e=>setDate(e.target.value)} max={today} className="p-2.5 border rounded-xl text-sm border-gray-200"/></div>
        <div className="flex gap-2 flex-wrap">
          <button onClick={()=>setAll(mode,'present')} className="bg-emerald-100 text-emerald-700 px-4 py-2 rounded-xl text-xs font-bold hover:bg-emerald-200">✓ حضور الجميع</button>
          <button onClick={()=>setAll(mode,'absent')} className="bg-red-100 text-red-700 px-4 py-2 rounded-xl text-xs font-bold hover:bg-red-200">✗ غياب الجميع</button>
        </div>
      </div>
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <div className="bg-emerald-50 rounded-xl p-3 text-center border border-emerald-100"><p className="text-2xl font-black text-emerald-600">{pCount}</p><p className="text-[10px] text-emerald-600 font-bold">حاضر</p></div>
        <div className="bg-red-50 rounded-xl p-3 text-center border border-red-100"><p className="text-2xl font-black text-red-600">{aCount}</p><p className="text-[10px] text-red-600 font-bold">غائب</p></div>
        <div className="bg-amber-50 rounded-xl p-3 text-center border border-amber-100"><p className="text-2xl font-black text-amber-600">{lCount}</p><p className="text-[10px] text-amber-600 font-bold">متأخر</p></div>
        <div className="bg-gray-50 rounded-xl p-3 text-center border border-gray-100"><p className="text-2xl font-black text-gray-500">{unRec}</p><p className="text-[10px] text-gray-500 font-bold">غير مسجل</p></div>
      </div>
      {people.length>0&&(<div className="mt-3"><div className="flex h-2 rounded-full overflow-hidden gap-px"><div className="bg-emerald-500 transition-all" style={{width:`${pCount/people.length*100}%`}}/><div className="bg-red-500 transition-all" style={{width:`${aCount/people.length*100}%`}}/><div className="bg-amber-500 transition-all" style={{width:`${lCount/people.length*100}%`}}/><div className="bg-gray-200 flex-1"/></div><p className="text-[10px] text-gray-400 mt-1">{people.length>0?Math.round(pCount/people.length*100):0}% نسبة الحضور</p></div>)}
    </div>
    {people.length===0?(<div className="bg-white rounded-2xl shadow-sm p-10 text-center"><UserCheck size={40} className="mx-auto mb-3 text-gray-200"/><p className="text-gray-400 text-sm">{mode==='students'?'لا يوجد طلاب في بوابة الأولياء':'لم يتم إضافة موظفين بعد'}</p></div>):(
      <div className="bg-white rounded-2xl shadow-sm overflow-hidden">
        <div className="p-3 border-b border-gray-100 bg-gray-50 grid grid-cols-[1fr,auto,auto,auto,auto] gap-2">
          <span className="text-[9px] font-bold text-gray-500">الاسم</span>
          {['present','late','excuse','absent'].map(s=><span key={s} className={`text-[9px] font-bold ${stCfg[s].t} w-12 sm:w-14 text-center`}>{stCfg[s].l}</span>)}
        </div>
        <div className="divide-y divide-gray-50 max-h-[500px] overflow-y-auto">
          {people.map(person=>{const st=dayAtt[person.id];return(
            <div key={person.id} className={`grid grid-cols-[1fr,auto,auto,auto,auto] gap-2 items-center p-3 hover:bg-gray-50 transition ${st?stCfg[st]?.br||'':''}`}>
              <div className="flex items-center gap-2 min-w-0">
                <div className={`w-8 h-8 rounded-lg flex items-center justify-center text-xs font-black flex-shrink-0 ${st?stCfg[st].b+' '+stCfg[st].t:'bg-gray-100 text-gray-500'}`}>{(person.name||'?')[0]}</div>
                <div className="min-w-0"><p className="text-xs font-bold text-gray-800 truncate">{person.name}</p><p className="text-[9px] text-gray-400">{mode==='students'?(person.grade||'—'):(person.position||'—')}</p></div>
              </div>
              {['present','late','excuse','absent'].map(s=>(
                <button key={s} onClick={()=>setAtt(mode,person.id,st===s?null:s)} className={`w-12 sm:w-14 h-8 rounded-lg text-[9px] font-bold transition-all border-2 ${st===s?stCfg[s].btn+' border-transparent shadow-sm scale-105':'bg-gray-50 text-gray-400 border-gray-100 hover:border-gray-300'}`}>{stCfg[s].l}</button>
              ))}
            </div>);
          })}
        </div>
      </div>
    )}
    {allDates.length>0&&(<div className="mt-5 bg-white rounded-2xl shadow-sm p-5">
      <h3 className="font-bold text-sm mb-3 text-gray-700 flex items-center gap-2"><Calendar size={14}/>سجل الحضور (آخر 30 يوم)</h3>
      <div className="space-y-2 max-h-60 overflow-y-auto">{allDates.map(d=>{
        const dd=(data[attKey]||{})[d]||{};const pc=Object.values(dd).filter(v=>v==='present').length;const ac=Object.values(dd).filter(v=>v==='absent').length;const tot=Object.keys(dd).length;
        return(<div key={d} className={`flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-gray-100 transition ${date===d?'bg-emerald-50 border border-emerald-200':'bg-gray-50'}`} onClick={()=>setDate(d)}>
          <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-xs font-black text-gray-700 shadow-sm flex-shrink-0">{new Date(d).getDate()}</div>
          <div className="flex-1 min-w-0"><p className="text-xs font-bold text-gray-700">{d}</p>{tot>0&&<div className="flex h-1.5 rounded-full overflow-hidden mt-0.5 bg-gray-200"><div className="bg-emerald-500" style={{width:`${pc/tot*100}%`}}/><div className="bg-red-500" style={{width:`${ac/tot*100}%`}}/></div>}</div>
          <div className="text-right flex-shrink-0"><span className="text-[10px] font-bold text-emerald-600">{pc} حضور</span><span className="text-[9px] text-gray-400 mr-1">{ac} غياب</span></div>
        </div>);
      })}</div>
    </div>)}
  </div>);
}

/* ═══════════════════════════════════════════════════════════════

function ATheme({data,setData,notify}){
  const theme=data.theme||{primaryColor:'#065f46',accentColor:'#fbbf24'};
  const [local,setLocal]=useState({primaryColor:theme.primaryColor||'#065f46',accentColor:theme.accentColor||'#fbbf24'});
  const presets=[
    {name:'أخضر إسلامي',primary:'#065f46',accent:'#fbbf24'},{name:'أزرق كلاسيكي',primary:'#1e40af',accent:'#f59e0b'},
    {name:'بنفسجي أنيق',primary:'#6d28d9',accent:'#f59e0b'},{name:'أحمر جريء',primary:'#991b1b',accent:'#fbbf24'},
    {name:'فيروزي حديث',primary:'#0e7490',accent:'#f59e0b'},{name:'بني دافئ',primary:'#78350f',accent:'#fbbf24'},
    {name:'رمادي احترافي',primary:'#374151',accent:'#f59e0b'},{name:'وردي ناعم',primary:'#9d174d',accent:'#fbbf24'},
  ];
  const applyTheme=(t)=>{
    let s=document.getElementById('dyn-theme');if(!s){s=document.createElement('style');s.id='dyn-theme';document.head.appendChild(s);}
    s.textContent=`
      header, .site-header { background-color: ${t.primaryColor} !important; }
      .btn-primary { background-color: ${t.primaryColor} !important; }
      .text-primary { color: ${t.primaryColor} !important; }
      .bg-primary { background-color: ${t.primaryColor} !important; }
      .border-primary { border-color: ${t.primaryColor} !important; }
      .bg-accent { background-color: ${t.accentColor} !important; }
      .text-accent { color: ${t.accentColor} !important; }
      nav { background-color: ${t.primaryColor} !important; }
    `;
    document.documentElement.style.setProperty('--color-primary',t.primaryColor);
    document.documentElement.style.setProperty('--color-accent',t.accentColor);
  };
  const save=()=>{setData({...data,theme:local});applyTheme(local);notify('تم حفظ التصميم وتطبيقه على الموقع','success');};
  const reset=()=>{const def={primaryColor:'#065f46',accentColor:'#fbbf24'};setLocal(def);setData({...data,theme:def});applyTheme(def);notify('تم إعادة التصميم للوضع الافتراضي');};
  return(<div>
