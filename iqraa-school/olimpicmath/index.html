<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أولمبياد الرياضيات</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
                    },
                    animation: {
                        'shake': 'shake 0.3s cubic-bezier(.36,.07,.19,.97) both',
                        'timer-shake': 'timer-shake 0.2s infinite',
                        'confetti-fall': 'confetti-fall linear infinite',
                        'firework': 'firework 3s ease-out infinite',
                    },
                    keyframes: {
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '25%': { transform: 'translateX(-20px)' },
                            '75%': { transform: 'translateX(20px)' },
                        },
                        'timer-shake': {
                            '0%, 100%': { transform: 'scale(1) rotate(-2deg)' },
                            '50%': { transform: 'scale(1.05) rotate(2deg)' },
                        },
                        'confetti-fall': {
                            '0%': { transform: 'translateY(0) rotate(0deg)', opacity: '1' },
                            '100%': { transform: 'translateY(115vh) rotate(1080deg)', opacity: '0' },
                        },
                        firework: {
                            '0%': { transform: 'translateY(100vh)', opacity: '1' },
                            '45%': { opacity: '1' },
                            '50%, 100%': { transform: 'translateY(15vh)', opacity: '0' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 20px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .shadow-neon { filter: drop-shadow(0 0 12px currentColor); }
        .shadow-glow { text-shadow: 0 0 20px #fbbf24; }
    </style>

    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, Fragment } = React;

        // --- بنك الأسئلة الشامل ---
        const curriculumData = {
          grade1: { title: "الصف الأول", s1: { title: "فصل 1", units: { u1: { title: "الجمع", questions: [{q: "5 + 3 = ?", a: "8", type: "number"}] } } }, s2: { title: "فصل 2", units: {} } },
          grade2: { title: "الصف الثاني", s1: { title: "فصل 1", units: { u1: { title: "الأعداد", questions: [{q: "20 + 30 = ?", a: "50", type: "number"}] } } }, s2: { title: "فصل 2", units: {} } },
          grade3: { title: "الصف الثالث", s1: { title: "فصل 1", units: { u1: { title: "الضرب", questions: [{q: "3 × 4 = ?", a: "12", type: "number"}] } } }, s2: { title: "فصل 2", units: {} } },
          grade4: { title: "الصف الرابع", s1: { title: "فصل 1", units: { u1: { title: "القسمة", questions: [{q: "20 ÷ 4 = ?", a: "5", type: "number"}] } } }, s2: { title: "فصل 2", units: {} } },
          grade5: { title: "الصف الخامس", s1: { title: "فصل 1", units: { u1: { title: "الأعداد", questions: [{q: "125 + 75 = ?", a: "200", type: "number"}] } } }, s2: { title: "فصل 2", units: {} } },
          grade6: { title: "الصف السادس", s1: { title: "فصل 1", units: { u1: { title: "الجبر", questions: [{q: "2س = 12", a: "6", type: "number"}] } } }, s2: { title: "فصل 2", units: {} } },
          grade7: { title: "الصف السابع", s1: { title: "فصل 1", units: { u1: { title: "الأعداد الموجهة", questions: [{q: "-10 + 5", a: "-5", type: "number"}] } } }, s2: { title: "فصل 2", units: {} } },
          
          grade8: {
            title: "الصف الثامن",
            s1: { title: "الفصل الأول", units: { u1: { title: "القوى", questions: [{q: "2 أس 3 = ?", a: "8", type: "number"}] } } },
            s2: { 
              title: "الفصل الدراسي الثاني", 
              units: {
                unit9: { title: "الوحدة 9: النسبة والتناسب", questions: [
                  { q: "بسّط النسبة 24 : 36 لأبسط صورة", a: "2:3", type: "ratio" },
                  { q: "قسّم مبلغ 150 ريالاً بنسبة 3 : 2. كم نصيب الأكبر؟", a: "90", type: "number" },
                  { q: "بسط النسبة المكونة من 3 أعداد: 12 : 30 : 24", a: "2:5:4", type: "ratio" },
                  { q: "إذا كان 1 ريال = 2.29 يورو، كم يورو في 10 ريالات؟", a: "22.9", type: "decimal" },
                  { q: "بسط النسبة 1.5 كجم : 500 جرام", a: "3:1", type: "ratio" },
                  { q: "نسبة الرجال للنساء 7:5 والعدد الكلي 240، كم عدد الرجال؟", a: "140", type: "number" }
                ]},
                unit10: { title: "الوحدة 10: المعادلات والمتباينات", questions: [
                  { q: "حل المعادلة: 4س + 14 = 8", a: "-1.5", type: "number" },
                  { q: "حل المعادلة: 2(س - 5) = 2 + 8س", a: "-2", type: "number" },
                  { q: "حل المتباينة: 3س ≤ 15", a: "س ≤ 5", type: "text" },
                  { q: "حل المعادلة: 3(س+3) + 5 = 5س", a: "7", type: "number" },
                  { q: "مجموع ثلاثة أعداد متتالية يساوي 141. ما العدد الأوسط؟", a: "47", type: "number" }
                ]},
                unit11: { title: "الوحدة 11: الرسوم البيانية", questions: [
                  { q: "أوجد ميل المستقيم المار بـ (1,3) و (3,7)", a: "2", type: "number" },
                  { q: "ما إحداثيات منتصف المسافة بين (2,4) و (6,8)؟", a: "(4, 6)", type: "coord" },
                  { q: "ميل المستقيم الرأسي يكون دائماً؟", a: "غير معرف", type: "text" },
                  { q: "معادلة المستقيم الذي ميله 2 ويقطع ص عند 3؟", a: "ص = 2س + 3", type: "text" }
                ]},
                unit12: { title: "الوحدة 12: المضلعات والزوايا", questions: [
                  { q: "مجموع الزوايا الخارجية لأي مضلع؟", a: "360", type: "number" },
                  { q: "قياس الزاوية الداخلية لسداسي منتظم؟", a: "120", type: "number" },
                  { q: "مثلث قائم طول ضلعيه 6سم و 8سم، ما طول الوتر؟", a: "10", type: "number" },
                  { q: "عدد أضلاع مضلع مجموع زواياه الداخلية 1800؟", a: "12", type: "number" }
                ]},
                unit13: { title: "الوحدة 13: الإحصاء", questions: [
                  { q: "المنوال للبيانات: 4, 2, 4, 3, 2, 4", a: "4", type: "number" },
                  { q: "الوسيط للأعداد: 3, 7, 9, 12, 15", a: "9", type: "number" },
                  { q: "المتوسط الحسابي للأعداد: 2, 4, 6, 8", a: "5", type: "number" },
                  { q: "المقياس الأنسب لبيانات بها قيمة متطرفة كبيرة؟", a: "الوسيط", type: "text" }
                ]}
              } 
            }
          },

          grade9: { title: "الصف التاسع", s1: {title:"فصل 1", units:{}}, s2: {title:"فصل 2", units:{}} },
          grade10: { title: "الصف العاشر", s1: {title:"فصل 1", units:{}}, s2: {title:"فصل 2", units:{}} },

          grade11: { 
            title: "الصف 11 متقدم", 
            s1: { title: "الفصل الأول", units: {} },
            s2: { 
              title: "الفصل الدراسي الثاني", 
              units: {
                unit7: { title: "الوحدة 7: التكامل", questions: [
                  { q: "تكامل 2س د س؟", a: "س^2 + ث", type: "text" },
                  { q: "أوجد تكامل (3س^2 + 4) د س", a: "س^3 + 4س + ث", type: "text" },
                  { q: "ما ناتج تكامل الجا س؟", a: "-جتا س + ث", type: "text" },
                  { q: "تكامل 1/س بالنسبة لـ س؟", a: "لو|س| + ث", type: "text" }
                ]},
                unit8: { title: "الوحدة 8: حساب المثلثات", questions: [
                  { q: "إذا كان ظا س = 1، فما قيمة س بالدرجات؟", a: "45", type: "number" },
                  { q: "تبسيط: جا^2 س + جتا^2 س = ؟", a: "1", type: "number" },
                  { q: "قيمة جتا (90 - س) تساوي؟", a: "جا س", type: "text" },
                  { q: "قانون جيب التمام: أ^2 = ب^2 + ج^2 - ؟", a: "2ب ج جتا أ", type: "text" }
                ]},
                unit9: { title: "الوحدة 9: المتجهات", questions: [
                  { q: "طول المتجه ع = (3 , 4) يساوي؟", a: "5", type: "number" },
                  { q: "المتجه الصفري هو المتجه الذي طوله يساوي؟", a: "0", type: "number" },
                  { q: "إذا كان أ=(1,2) ب=(3,4)، فما ناتج أ + ب؟", a: "(4, 6)", type: "coord" }
                ]},
                unit11: { title: "الوحدة 11: الهندسة 3D", questions: [
                  { q: "حل المعادلة: |2س - 1| = 3 (س موجبة)", a: "2", type: "number" },
                  { q: "حل المعادلة: |س^2 - 4| = 12 (س موجبة)", a: "4", type: "number" },
                  { q: "المسافة بين (0,0,0) و (3,4,0) في الفضاء؟", a: "5", type: "number" }
                ]}
              } 
            }
          },
          grade12: { title: "الصف الثاني عشر", s1: {title:"فصل 1", units:{}}, s2: {title:"فصل 2", units:{}} }
        };

        const ReactorTimer = ({ seconds, total = 30 }) => {
          const percentage = (seconds / total) * 100;
          const isCritical = seconds <= 5;
          const color = isCritical ? '#ef4444' : seconds <= 15 ? '#f59e0b' : '#3b82f6';

          return (
            <div className={`relative flex items-center justify-center w-28 h-28 ${isCritical ? 'animate-timer-shake' : ''}`}>
              <svg className="w-full h-full transform -rotate-90 drop-shadow-md">
                <circle cx="56" cy="56" r="48" stroke="currentColor" strokeWidth="6" fill="transparent" className="text-slate-200" />
                <circle 
                    cx="56" cy="56" r="48" stroke={color} strokeWidth="8" fill="transparent" 
                    strokeDasharray="301.5" 
                    strokeDashoffset={301.5 - (301.5 * percentage) / 100}
                    className="transition-all duration-1000 ease-linear shadow-neon"
                    strokeLinecap="round"
                />
              </svg>
              <div className="absolute inset-0 flex flex-col items-center justify-center">
                <span className={`text-4xl font-mono font-black ${isCritical ? 'text-red-500 animate-pulse' : 'text-slate-800'}`}>
                    {seconds}
                </span>
                {isCritical && <i className="fas fa-fire text-red-500 animate-bounce mt-1" style={{ fontSize: 20 }}></i>}
              </div>
            </div>
          );
        };

        const Celebration = () => (
          <div className="fixed inset-0 pointer-events-none z-[100] overflow-hidden bg-white/5 backdrop-blur-[2px]">
            {[...Array(60)].map((_, i) => (
              <div key={i} className="absolute animate-confetti drop-shadow-md" 
                style={{
                  left: `${Math.random() * 100}%`, top: `-10%`,
                  backgroundColor: ['#3b82f6', '#ec4899', '#10b981', '#f59e0b', '#8b5cf6'][Math.floor(Math.random() * 5)],
                  width: `${Math.random() * 14 + 8}px`, height: `${Math.random() * 14 + 8}px`, borderRadius: Math.random() > 0.5 ? '50%' : '4px',
                  animationDelay: `${Math.random() * 5}s`, animationDuration: `${Math.random() * 2 + 2}s`
                }} 
              />
            ))}
          </div>
        );

        const App = () => {
          const [gameState, setGameState] = useState('landing'); 
          const [selectedGrade, setSelectedGrade] = useState(null);
          const [selectedSemester, setSelectedSemester] = useState(null);
          
          const [playerName, setPlayerName] = useState(''); 
          const [studentNames, setStudentNames] = useState(Array(23).fill(''));
          
          const [currentStudentIndex, setCurrentStudentIndex] = useState(0);
          const [gameMode, setGameMode] = useState(null); 
          const [selectedUnitKey, setSelectedUnitKey] = useState(null);
          const [soloScore, setSoloScore] = useState(0);
          const [currentQIdx, setCurrentQIdx] = useState(0);
          const [timeLeft, setTimeLeft] = useState(30);
          const [selectedAns, setSelectedAns] = useState(null);
          const [currentOptions, setCurrentOptions] = useState([]);
          const [ropePos, setRopePos] = useState(50); 
          const [tugQuestions, setTugQuestions] = useState({ q1: null, q2: null });
          const [tugOptions, setTugOptions] = useState({ o1: [], o2: [] });
          const [tugAnswered, setTugAnswered] = useState({ a1: false, a2: false });
          const [isShaking, setIsShaking] = useState(false);
          const [climbHeight, setClimbHeight] = useState(0);

          const renderMath = useCallback((text) => {
            if (text == null) return null;
            const strText = String(text);
            const isMathPart = /[0-9]|[:\-+=<>()≤≥^|]/.test(strText);
            return isMathPart ? (
              <span dir="ltr" className="inline-block font-mono font-bold mx-1 text-inherit" style={{ unicodeBidi: 'isolate', direction: 'ltr' }}>
                {strText}
              </span>
            ) : <span className="inline-block">{strText}</span>;
          }, []);

          const formatText = useCallback((text) => {
            if (text == null) return null;
            const strText = String(text);
            const parts = strText.split(/(\d+(?:\.\d+)?|[:\-+=<>()≤≥^|]+)/g);
            return (
              <Fragment>
                {parts.map((part, i) => <Fragment key={i}>{renderMath(part)}</Fragment>)}
              </Fragment>
            );
          }, [renderMath]);

          const playHypeSound = (type) => {
            try {
              const AudioCtx = window.AudioContext || window.webkitAudioContext;
              const ctx = new AudioCtx(); if (ctx.state === 'suspended') ctx.resume();
              const osc = ctx.createOscillator(); const gain = ctx.createGain();
              osc.connect(gain); gain.connect(ctx.destination);
              if (type === 'correct') { 
                osc.frequency.setValueAtTime(659, ctx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(1318, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
              } else if (type === 'win') {
                [523, 659, 784, 1046].forEach((f, i) => {
                  const o = ctx.createOscillator(); const g = ctx.createGain();
                  o.connect(g); g.connect(ctx.destination);
                  o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.1);
                  g.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.1);
                  g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.1 + 0.5);
                  o.start(ctx.currentTime + i * 0.1); o.stop(ctx.currentTime + i * 0.1 + 0.5);
                });
                return;
              } else if (type === 'tick') {
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                gain.gain.setValueAtTime(0.05, ctx.currentTime);
                osc.start(); osc.stop(ctx.currentTime + 0.05);
                return;
              } else { 
                osc.frequency.setValueAtTime(150, ctx.currentTime); 
                gain.gain.setValueAtTime(0.2, ctx.currentTime); 
              }
              osc.start(); osc.stop(ctx.currentTime + 0.2);
            } catch (e) {}

            try {
              if (type !== 'tick') {
                  window.speechSynthesis.cancel();
                  const msg = new SpeechSynthesisUtterance();
                  msg.text = type === 'correct' ? "إجابة رائعة" : (type === 'win' ? "مبارك الفوز والتفوق" : "حاول مرة أخرى");
                  msg.pitch = type === 'correct' ? 1.4 : 0.8; msg.lang = 'ar-SA';
                  window.speechSynthesis.speak(msg);
              }
            } catch (e) {}
          };

          const generateOptions = useCallback((qObj) => {
            if (!qObj) return [];
            const correct = String(qObj.a); 
            const distractors = new Set();
            
            if (qObj.type === "number" || qObj.type === "decimal") {
              const n = parseFloat(correct); 
              if (!isNaN(n)) {
                  distractors.add((n + 1).toFixed(correct.includes('.') ? 1 : 0)); 
                  distractors.add((n - 1).toFixed(correct.includes('.') ? 1 : 0)); 
                  distractors.add((n * 2).toFixed(correct.includes('.') ? 1 : 0));
              }
            } else if (qObj.type === "ratio") {
              const p = correct.split(':'); 
              if (p.length >= 2) {
                  distractors.add(`${p[1]}:${p[0]}`); 
                  distractors.add(`${parseInt(p[0])+1}:${p[1]}`);
              }
            } else if (qObj.type === "coord") {
              const clean = correct.replace(/[()]/g, '').split(','); 
              if(clean.length >= 2) {
                  distractors.add(`(${parseInt(clean[0])+1}, ${clean[1]})`); 
                  distractors.add(`(${clean[1]}, ${clean[0]})`);
              }
            } else { 
                distractors.add("إجابة أخرى"); 
                distractors.add("خطأ"); 
            }
            
            const filtered = Array.from(distractors).filter(d => d !== correct);
            return [correct, ...filtered.slice(0, 3)].sort(() => Math.random() - 0.5);
          }, []);

          const startGameLogic = (unitKey, mode) => {
            setSelectedUnitKey(unitKey); setGameMode(mode); setCurrentQIdx(0); setSoloScore(0); setClimbHeight(0);
            const unit = curriculumData[selectedGrade]?.[selectedSemester]?.units?.[unitKey];
            if (!unit || !unit.questions || unit.questions.length === 0) return;

            if (mode === 'solo' || mode === 'climb' || mode === 'free_play') {
              setGameState(mode === 'climb' ? 'playing_climb' : 'playing_solo');
              setCurrentOptions(generateOptions(unit.questions[0])); setSelectedAns(null); setTimeLeft(30);
            } else if (mode === 'tug') {
              setGameState('playing_tug'); setRopePos(50); loadNewTugQuestions(unitKey);
              setTimeLeft(30);
            }
          };

          const handleSoloAnswer = (ans) => {
            if (selectedAns !== null) return;
            const correct = String(curriculumData[selectedGrade]?.[selectedSemester]?.units?.[selectedUnitKey]?.questions?.[currentQIdx]?.a);
            setSelectedAns(ans); 
            if (ans === correct) { 
                setSoloScore(s => s + 1); playHypeSound('correct'); 
                if (gameMode === 'climb') setClimbHeight(prev => Math.min(prev + 20, 100));
            } else {
                playHypeSound('wrong');
                if (gameMode === 'climb') setClimbHeight(prev => Math.max(prev - 10, 0));
            }
          };

          const nextSoloQuestion = () => {
            const next = currentQIdx + 1;
            const questions = curriculumData[selectedGrade]?.[selectedSemester]?.units?.[selectedUnitKey]?.questions || [];
            if (next < questions.length && (gameMode !== 'climb' || climbHeight < 100)) {
              setCurrentQIdx(next); setCurrentOptions(generateOptions(questions[next])); setSelectedAns(null); setTimeLeft(30);
            } else { setGameState('result'); playHypeSound('win'); }
          };

          const loadNewTugQuestions = useCallback((unitKey) => {
            const unitQs = curriculumData[selectedGrade]?.[selectedSemester]?.units?.[unitKey]?.questions || [];
            if (unitQs.length === 0) return;
            const q1 = unitQs[Math.floor(Math.random() * unitQs.length)];
            const q2 = unitQs[Math.floor(Math.random() * unitQs.length)];
            setTugQuestions({ q1, q2 }); setTugOptions({ o1: generateOptions(q1), o2: generateOptions(q2) }); setTugAnswered({ a1: false, a2: false });
            setTimeLeft(30);
          }, [selectedGrade, selectedSemester, generateOptions]);

          const handleTugAnswer = (team, ans) => {
            if (tugAnswered[`a${team}`]) return;
            const correct = String(tugQuestions[`q${team}`]?.a); 
            const isRight = ans === correct;
            setTugAnswered(prev => ({ ...prev, [`a${team}`]: true }));
            setIsShaking(true); setTimeout(() => setIsShaking(false), 200);
            if (isRight) { playHypeSound('correct'); setRopePos(prev => Math.min(Math.max(prev + (team === 1 ? -20 : 20), 0), 100)); }
            else { playHypeSound('wrong'); setRopePos(prev => Math.min(Math.max(prev + (team === 1 ? 12 : -12), 0), 100)); }
            setTimeout(() => { if (gameState === 'playing_tug') loadNewTugQuestions(selectedUnitKey); }, 800);
          };

          useEffect(() => {
            let timer;
            if (['playing_solo', 'playing_climb', 'playing_tug'].includes(gameState) && timeLeft > 0 && selectedAns === null) {
              timer = setInterval(() => {
                setTimeLeft(t => {
                    if (t <= 10 && t > 1) playHypeSound('tick');
                    return t - 1;
                });
              }, 1000);
            } else if (timeLeft === 0 && selectedAns === null && gameState.startsWith('playing')) {
              if (gameState === 'playing_tug') {
                  playHypeSound('wrong');
                  setRopePos(prev => prev > 50 ? Math.min(prev + 10, 100) : Math.max(prev - 10, 0));
                  loadNewTugQuestions(selectedUnitKey);
              } else {
                  handleSoloAnswer('__timeout__');
              }
            }
            return () => { if (timer) clearInterval(timer); };
          }, [timeLeft, gameState, selectedAns, selectedUnitKey, loadNewTugQuestions, playHypeSound]);

          useEffect(() => { if (gameState === 'playing_tug' && (ropePos <= 5 || ropePos >= 95)) { setGameState('result'); playHypeSound('win'); } }, [ropePos, gameState, playHypeSound]);

          return (
            <div className="min-h-screen flex flex-col relative w-full h-full">
              {gameState === 'result' && <Celebration />}

              <div className="max-w-7xl mx-auto px-6 py-6 flex-1 flex flex-col relative z-10 w-full">
                
                {/* Landing Page */}
                {gameState === 'landing' && (

                    </div>
                    
                    <h2 className="text-[100px] font-black text-slate-800 leading-none drop-shadow-md italic tracking-tighter shrink-0 uppercase">فوز أسطوري! 🏆</h2>
                    
                    <div className="bg-white/90 backdrop-blur-2xl border-8 border-yellow-400/50 p-24 rounded-[100px] w-full max-w-5xl shadow-[0_30px_80px_rgba(0,0,0,0.1)] relative overflow-hidden group shrink-0">
                      <div className="absolute inset-0 bg-gradient-to-r from-blue-50 via-transparent to-rose-50 pointer-events-none opacity-50" />
                      <p className="text-4xl text-slate-500 mb-8 font-black tracking-[10px] uppercase relative z-10">البطل المتوج</p>
                      <p className={`text-[120px] font-black leading-none drop-shadow-sm animate-pulse relative z-10 ${['solo', 'climb', 'free_play'].includes(gameMode) ? 'text-indigo-600' : (ropePos <= 50 ? 'text-blue-600' : 'text-rose-600')}`}>
                        {['solo', 'climb', 'free_play'].includes(gameMode) ? (gameMode === 'free_play' ? (playerName || "بطل مجهول") : (studentNames[currentStudentIndex] || playerName || "بـطـل")) : (ropePos <= 50 ? "الفريق الأزرق" : "الفريق الأحمر")}
                      </p>
                    </div>
                    
                    <div className="flex gap-8 w-full max-w-4xl pt-10 shrink-0 pb-12">
                      <button onClick={() => { if (gameMode === 'solo' && currentStudentIndex < studentNames.filter(n=>n.trim()).length - 1) { setCurrentStudentIndex(prev => prev + 1); setGameState('playing_solo'); startGameLogic(selectedUnitKey, 'solo'); } else { setGameState('landing'); setCurrentStudentIndex(0); setPlayerName(''); } }} className="flex-1 bg-slate-800 text-white px-16 py-10 rounded-full text-5xl font-black shadow-xl hover:bg-slate-700 hover:scale-105 transition-all duration-300"> {gameMode === 'solo' && currentStudentIndex < studentNames.filter(n=>n.trim()).length - 1 ? "البطل التالي ➡️" : "الرئيسية 🏠"} </button>
                      <button onClick={() => setGameState('select_mode')} className="flex-1 bg-white text-slate-800 border-4 border-slate-200 px-16 py-10 rounded-full text-5xl font-black shadow-lg hover:border-slate-300 hover:bg-slate-50 transition-all duration-300 italic">تحدي جديد 🔄</button>
                    </div>
                  </div>
                )}
              </div>

              <footer className="relative z-20 pb-8 pt-4 text-center px-4 shrink-0">
                  <div className="bg-white/80 backdrop-blur-md border border-slate-200 p-8 rounded-[40px] max-w-5xl mx-auto shadow-lg">
                      <div className="flex flex-col md:flex-row items-center justify-center gap-6 mb-4">
                          <div className="flex items-center gap-3 bg-blue-50 px-6 py-2 rounded-full border border-blue-100 text-xl font-black text-blue-700"> فكرة الطالب: عبدالله آل فنة </div>
                          <div className="flex items-center gap-3 bg-purple-50 px-6 py-2 rounded-full border border-purple-100 text-xl font-black text-purple-700"> إشراف وتطوير: الأستاذ علي خليل </div>
                      </div>
                      <div className="text-2xl font-bold text-slate-500 mb-6 tracking-widest"> (مشروع مبدعي المستقبل) - مدرسة اقرأ الخاصة </div>
                      <div className="flex items-center justify-center gap-3 text-orange-500 animate-pulse border-t border-slate-200 pt-6 font-black italic text-xl"> 
                        <i className="fas fa-exclamation-circle" style={{ fontSize: 28 }}></i> هذا المشروع نسخة تجريبية وتحت التطوير والتحسين 
                      </div>
                  </div>
              </footer>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
