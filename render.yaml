# Render Blueprint — Iqraa School (Web + PostgreSQL)
# Deploy: https://render.com/deploy?repo=https://github.com/Alikhalil2r/iqraa22
# After first deploy: Shell → cd server && npm run db:seed (one-time demo data)

databases:
  - name: iqraa-db
    plan: free
    databaseName: iqraa_school
    user: iqraa

services:
  - type: web
    name: iqraa-web
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEMO_MODE
        value: "false"
      - key: PORT
        value: "3001"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: iqraa-db
          property: connectionString
      - key: PUBLIC_URL
        fromService:
          type: web
          name: iqraa-web
          property: url
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: iqraa-web
          property: url
      - key: BACKUP_AUTO
        value: "false"
      - key: ADMIN_2FA_REQUIRED
        value: "false"
      - key: LOG_LEVEL
        value: info
